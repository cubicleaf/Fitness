        const SettingsModal = ({ onClose, onCategoriesChanged, categories: settingsCategories, unit, setUnit }) => {
            const [activeTab, setActiveTab] = useState('weekly');
            const [weeklyLabels, setWeeklyLabels] = useState({
                0: '', 1: '', 2: '', 3: '', 4: '', 5: '', 6: ''
            });
            const [resetConfirmStep, setResetConfirmStep] = useState(null);
            const [resetConfirmText, setResetConfirmText] = useState('');
            const [showCatEditor, setShowCatEditor] = useState(false);
            const [editingDayIdx, setEditingDayIdx] = useState(null);
            const [dupWarning, setDupWarning] = useState(() => getPref('skipDupWarning') !== 'true');
            const [weightBanner, setWeightBanner] = useState(() => getPref('hideWeightBanner') !== 'true');
            const [repEmber, setRepEmber] = useState(() => getPref('disableRepEmber') !== 'true');
            const [timerSounds, setTimerSounds] = useState(() => getPref('timerSoundsEnabled') === 'true');
            const [showSoundConfig, setShowSoundConfig] = useState(false);
            const [showDupInfo, setShowDupInfo] = useState(false);

            const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const templateOptions = ['', ...(settingsCategories || ['Push', 'Pull', 'Legs', 'Core', 'Cardio']), 'Rest'];

            const handleSelectChange = (idx, value) => {
                if (value === '__add_new__') {
                    setShowCatEditor(true);
                } else {
                    setWeeklyLabels({ ...weeklyLabels, [idx]: value });
                }
            };

            useEffect(() => {
                if (activeTab === 'weekly') {
                    const loadTemplates = async () => {
                        const temps = await dbOps.templates.getAll();
                        const labels = { 0: '', 1: '', 2: '', 3: '', 4: '', 5: '', 6: '' };
                        temps.forEach(t => {
                            labels[t.dayOfWeek] = t.label || '';
                        });
                        setWeeklyLabels(labels);
                    };
                    loadTemplates();
                }
            }, [activeTab]);

            const handleSaveTemplate = async () => {
                // Load current templates to check what changed
                const oldTemps = await dbOps.templates.getAll();
                const oldLabels = {};
                oldTemps.forEach(t => { oldLabels[t.dayOfWeek] = t.label || ''; });

                for (let i = 0; i < 7; i++) {
                    await dbOps.templates.set(i, weeklyLabels[i]);
                }

                // Check if today's day-of-week was changed
                const todayDow = parseLocalDate(getTodayString()).getDay();
                const todayStr = getTodayString();
                if (oldLabels[todayDow] !== weeklyLabels[todayDow]) {
                    if (window.confirm(`Apply "${weeklyLabels[todayDow] || 'None'}" to today as well?`)) {
                        await dbOps.dayNotes.set(`__split_${todayStr}`, weeklyLabels[todayDow]);
                    }
                }

                onClose();
            };

            const handleExport = async () => {
                const allExercises = await dbOps.exercises.getAll();
                const allSets = [];
                const tx = db.transaction('sets', 'readonly');
                await new Promise((resolve) => {
                    const req = tx.objectStore('sets').getAll();
                    req.onsuccess = () => {
                        allSets.push(...req.result);
                        resolve();
                    };
                });

                // Load all session notes for export
                const allSessionNotes = [];
                const snTx = db.transaction('sessionNotes', 'readonly');
                await new Promise((resolve) => {
                    const req = snTx.objectStore('sessionNotes').getAll();
                    req.onsuccess = () => {
                        allSessionNotes.push(...req.result);
                        resolve();
                    };
                });
                const noteMap = {};
                allSessionNotes.forEach(sn => {
                    noteMap[`${sn.exerciseId}_${sn.date}`] = sn;
                });

                // Include weekly splits as a metadata row
                const allTemplates = await dbOps.templates.getAll();
                const splitMap = {};
                allTemplates.forEach(t => { splitMap[t.dayOfWeek] = t.label || ''; });
                const splitLine = ['__SPLITS__', splitMap[0]||'', splitMap[1]||'', splitMap[2]||'', splitMap[3]||'', splitMap[4]||'', splitMap[5]||'', splitMap[6]||'', '', ''].join(',');

                // Also export per-day split overrides
                const allDayNotes = [];
                const dnTx = db.transaction('dayNotes', 'readonly');
                await new Promise((resolve) => {
                    const req = dnTx.objectStore('dayNotes').getAll();
                    req.onsuccess = () => { allDayNotes.push(...req.result); resolve(); };
                });
                let daySplitLines = '';
                let unitLine = '';
                let bwLine = '';
                allDayNotes.forEach(dn => {
                    if (dn.date.startsWith('__split_')) {
                        const splitDate = dn.date.replace('__split_', '');
                        daySplitLines += `__DAYSPLIT__,${splitDate},${dn.note},,,,,,, \n`;
                    } else if (dn.date === '__unit__') {
                        unitLine = `__UNIT__,${dn.note},,,,,,,, \n`;
                    } else if (dn.date === '__bodyweight__') {
                        bwLine = `__BODYWEIGHT__,${dn.note},,,,,,,, \n`;
                    }
                });

                let csv = 'Date,Exercise,Category,Type,Set,Weight,WeightType,Reps,Duration,Note\n';
                // Recalculate setOrder on export to fix any stored inconsistencies
                allSets.sort((a, b) => a.date.localeCompare(b.date) || a.exerciseOrder - b.exerciseOrder || a.setOrder - b.setOrder || a.createdAt - b.createdAt);
                const setOrderCounters = {};
                allSets.forEach(set => {
                    const key = `${set.date}_${set.exerciseId}`;
                    setOrderCounters[key] = (setOrderCounters[key] || 0) + 1;
                    set._exportSetOrder = setOrderCounters[key];
                });
                allSets.forEach(set => {
                        const ex = allExercises.find(e => e.id === set.exerciseId) || {};
                        const weightStr = set.weight !== null ? set.weight : '';
                        const repsStr = set.reps !== null ? set.reps : '';
                        const durationStr = set.duration !== null ? set.duration : '';
                        let noteStr = '';
                        if (set.weightType === 'banded' && set.bandedColor) {
                            noteStr = set.bandedColor;
                            if (set._exportSetOrder === 1) {
                                const sn = noteMap[`${set.exerciseId}_${set.date}`];
                                if (sn) {
                                    const parts = [];
                                    if (sn.mood) parts.push(`Mood:${sn.mood}`);
                                    if (sn.formCueText) parts.push(`Form:${sn.formCueText}`);
                                    if (sn.freeText) parts.push(`General:${sn.freeText}`);
                                    if (parts.length > 0) noteStr += '|' + parts.join('|');
                                }
                            }
                        } else if (set._exportSetOrder === 1) {
                            const sn = noteMap[`${set.exerciseId}_${set.date}`];
                            if (sn) {
                                const parts = [];
                                if (sn.mood) parts.push(`Mood:${sn.mood}`);
                                if (sn.formCueText) parts.push(`Form:${sn.formCueText}`);
                                if (sn.freeText) parts.push(`General:${sn.freeText}`);
                                noteStr = parts.join('|');
                            }
                        }
                        const noteClean = noteStr.replace(/\r?\n/g, ' ').replace(/\r/g, ' ');
                        const noteField = noteClean.includes(',') || noteClean.includes('"') ? `"${noteClean.replace(/"/g, '""')}"` : noteClean;
                        csv += `${set.date},${set.exerciseName},${getExCategories(ex).join(';') || ''},${ex.type || ''},${set._exportSetOrder},${weightStr},${set.weightType},${repsStr},${durationStr},${noteField}\n`;
                    });
                // Metadata section at bottom — used for re-import, safe to ignore when reading
                csv += '\n__META__,,,,,,,,,\n';
                if (unitLine) csv += unitLine;
                if (bwLine) csv += bwLine;
                // Only include splits line if there's actual template data
                const hasSplitData = Object.values(splitMap).some(v => v);
                if (hasSplitData) csv += splitLine + '\n';
                if (daySplitLines) csv += daySplitLines;

                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `fitness-export-${getTodayString()}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            // Proper CSV line parser that handles quoted fields
            const parseCSVLine = (line) => {
                const fields = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const ch = line[i];
                    if (inQuotes) {
                        if (ch === '"' && line[i + 1] === '"') {
                            current += '"';
                            i++; // skip escaped quote
                        } else if (ch === '"') {
                            inQuotes = false;
                        } else {
                            current += ch;
                        }
                    } else {
                        if (ch === '"') {
                            inQuotes = true;
                        } else if (ch === ',') {
                            fields.push(current.trim());
                            current = '';
                        } else {
                            current += ch;
                        }
                    }
                }
                fields.push(current.trim());
                return fields;
            };

            const [importStatus, setImportStatus] = useState(null);

            const handleImport = async () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.csv';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    setImportStatus('Reading file...');

                    const text = await file.text();
                    const allLines = text.split('\n').slice(1).filter(l => l.trim());

                    // Check for metadata rows and extract data
                    let importedSplits = null;
                    const importedDaySplits = [];
                    let importedUnit = 'lbs';
                    let importedBodyweight = null;
                    const lines = allLines.filter(l => {
                        const parts = parseCSVLine(l);
                        if (parts[0] === '__META__') return false;
                        if (parts[0] === '__UNIT__') {
                            importedUnit = parts[1] || 'lbs';
                            return false;
                        }
                        if (parts[0] === '__BODYWEIGHT__') {
                            importedBodyweight = parts[1] || null;
                            return false;
                        }
                        if (parts[0] === '__SPLITS__') {
                            importedSplits = { 0: parts[1]||'', 1: parts[2]||'', 2: parts[3]||'', 3: parts[4]||'', 4: parts[5]||'', 5: parts[6]||'', 6: parts[7]||'' };
                            return false;
                        }
                        if (parts[0] === '__DAYSPLIT__') {
                            importedDaySplits.push({ date: parts[1], split: parts[2] || '' });
                            return false;
                        }
                        return true;
                    });
                    const totalLines = lines.length;

                    setImportStatus(`Parsing ${totalLines} rows...`);

                    // PHASE 1: Parse all lines into structured data (no DB operations)
                    const exerciseMap = new Map(); // name -> exercise object
                    const existingExercises = await dbOps.exercises.getAll();
                    existingExercises.forEach(ex => exerciseMap.set(ex.name, ex));

                    const parsedRows = [];
                    for (const line of lines) {
                        try {
                            const parts = parseCSVLine(line);
                            const date = parts[0];
                            const exerciseName = parts[1];
                            if (!date || !exerciseName) continue;

                            const categoryRaw = (parts[2] || 'push').toLowerCase();
                            const categories_arr = categoryRaw.includes(';') ? categoryRaw.split(';').filter(Boolean) : [categoryRaw];
                            const category = categories_arr[0] || 'push';
                            const rawType = (parts[3] || 'reps').toLowerCase();
                            const type = (rawType === 'reps' || rawType === 'timed') ? rawType : 'reps';
                            const weightType = parts[6] || 'lbs';
                            const note = (parts[9] || '');

                            // Create exercise record if needed
                            if (!exerciseMap.has(exerciseName)) {
                                const newEx = {
                                    id: generateId('ex'),
                                    name: exerciseName,
                                    category,
                                    categories: categories_arr,
                                    type,
                                    note: '',
                                    lastUsed: date,
                                    createdAt: Date.now(),
                                };
                                exerciseMap.set(exerciseName, newEx);
                            } else {
                                const ex = exerciseMap.get(exerciseName);
                                if (date > (ex.lastUsed || '')) {
                                    ex.lastUsed = date;
                                }
                            }

                            parsedRows.push({
                                date,
                                exerciseName,
                                setOrder: parseInt(parts[4]) || 1,
                                weight: (parts[5] && parts[5] !== '') ? parseFloat(parts[5]) : null,
                                weightType,
                                reps: (parts[7] && parts[7] !== '') ? parseInt(parts[7]) : null,
                                duration: (parts[8] && parts[8] !== '') ? parseInt(parts[8]) : null,
                                bandedColor: (weightType === 'banded' && note) ? note.split('|')[0].trim() : undefined,
                                note: (weightType === 'banded' && note && note.includes('|')) ? note.split('|').slice(1).join('|').trim() : (weightType !== 'banded' ? note : ''),
                            });
                        } catch (err) {
                            console.error('Parse error:', line, err);
                        }
                    }

                    // PHASE 2: Compute exerciseOrder for each exercise on each date
                    // Group rows by date to assign exerciseOrder
                    const byDate = new Map();
                    for (const row of parsedRows) {
                        if (!byDate.has(row.date)) byDate.set(row.date, []);
                        byDate.get(row.date).push(row);
                    }

                    // For each date, assign exerciseOrder based on first appearance
                    const setsToWrite = [];
                    for (const [date, rows] of byDate) {
                        const exerciseOrderMap = new Map();
                        let nextOrder = 1;
                        for (const row of rows) {
                            if (!exerciseOrderMap.has(row.exerciseName)) {
                                exerciseOrderMap.set(row.exerciseName, nextOrder++);
                            }
                        }

                        for (const row of rows) {
                            const exercise = exerciseMap.get(row.exerciseName);
                            setsToWrite.push({
                                id: generateId('set'),
                                date,
                                exerciseId: exercise.id,
                                exerciseName: exercise.name,
                                exerciseOrder: exerciseOrderMap.get(row.exerciseName),
                                setOrder: row.setOrder,
                                weight: row.weight,
                                weightType: row.weightType,
                                bandedColor: row.bandedColor,
                                reps: row.reps,
                                duration: row.duration,
                                createdAt: Date.now(),
                            });
                        }
                    }

                    // PHASE 3: Write exercises to DB (batch transaction)
                    setImportStatus('Writing activities...');
                    const exercisesToWrite = Array.from(exerciseMap.values());
                    await new Promise((resolve, reject) => {
                        const tx = db.transaction('exercises', 'readwrite');
                        const store = tx.objectStore('exercises');
                        for (const ex of exercisesToWrite) {
                            store.put(ex); // put = upsert
                        }
                        tx.oncomplete = () => resolve();
                        tx.onerror = () => reject(tx.error);
                    });

                    // PHASE 4: Write sets to DB in batches (batch transaction)
                    setImportStatus(`Writing ${setsToWrite.length} sets...`);
                    const BATCH_SIZE = 200;
                    for (let i = 0; i < setsToWrite.length; i += BATCH_SIZE) {
                        const batch = setsToWrite.slice(i, i + BATCH_SIZE);
                        await new Promise((resolve, reject) => {
                            const tx = db.transaction('sets', 'readwrite');
                            const store = tx.objectStore('sets');
                            for (const set of batch) {
                                store.add(set);
                            }
                            tx.oncomplete = () => resolve();
                            tx.onerror = () => reject(tx.error);
                        });
                        setImportStatus(`Writing sets... ${Math.min(i + BATCH_SIZE, setsToWrite.length)}/${setsToWrite.length}`);
                    }

                    // PHASE 5: Write session notes
                    setImportStatus('Writing session notes...');
                    const sessionNotesToWrite = [];

                    // Helper function to map old tags to mood 1-5
                    const mapTagToMood = (tag) => {
                        const lowTag = tag.toLowerCase();
                        if (['felt weak', 'low energy', 'feeling sick'].some(t => lowTag.includes(t))) return 2;
                        if (['felt normal', 'fatigued'].some(t => lowTag.includes(t))) return 3;
                        if (['felt strong', 'high energy', 'good pump'].some(t => lowTag.includes(t))) return 4;
                        return null;
                    };

                    for (const row of parsedRows) {
                        if (row.note && row.setOrder === 1) {
                            const exercise = exerciseMap.get(row.exerciseName);
                            const noteParts = row.note.split('|').map(p => p.trim());
                            let mood = null;
                            const tags = [];
                            let formCueText = '';
                            let freeText = '';
                            noteParts.forEach(p => {
                                if (p.startsWith('Mood:')) {
                                    mood = parseInt(p.substring(5).trim());
                                } else if (p.startsWith('Form:')) {
                                    formCueText = p.substring(5).trim();
                                } else if (p.startsWith('General:')) {
                                    freeText = p.substring(8).trim();
                                } else if (p) {
                                    // Old-style tag - try to map it
                                    const mappedMood = mapTagToMood(p);
                                    if (mappedMood && !mood) mood = mappedMood;
                                    tags.push(p); // Keep for backward compatibility
                                }
                            });
                            if (mood || tags.length > 0 || formCueText || freeText) {
                                sessionNotesToWrite.push({
                                    id: `sn_${exercise.id}_${row.date}`,
                                    exerciseId: exercise.id,
                                    date: row.date,
                                    mood,
                                    tags: tags.length > 0 ? tags : undefined,
                                    freeText,
                                    formCueText,
                                    updatedAt: new Date().toISOString(),
                                });
                            }
                        }
                    }

                    if (sessionNotesToWrite.length > 0) {
                        await new Promise((resolve, reject) => {
                            const tx = db.transaction('sessionNotes', 'readwrite');
                            const store = tx.objectStore('sessionNotes');
                            for (const sn of sessionNotesToWrite) {
                                store.put(sn);
                            }
                            tx.oncomplete = () => resolve();
                            tx.onerror = () => reject(tx.error);
                        });
                    }

                    // PHASE 6: Write metadata
                    if (importedUnit) {
                        await dbOps.dayNotes.set('__unit__', importedUnit);
                    }
                    if (importedBodyweight) {
                        await dbOps.dayNotes.set('__bodyweight__', importedBodyweight);
                    }

                    // PHASE 7: Write weekly splits if present
                    if (importedSplits) {
                        for (let i = 0; i < 7; i++) {
                            await dbOps.templates.set(i, importedSplits[i] || '');
                        }
                    }

                    // Write per-day splits
                    for (const ds of importedDaySplits) {
                        await dbOps.dayNotes.set(`__split_${ds.date}`, ds.split);
                    }

                    setImportStatus(`Done! Imported ${setsToWrite.length} sets for ${exercisesToWrite.length} activities.`);

                    // Wait briefly for UI to show success, then reload
                    await new Promise(r => setTimeout(r, 1000));
                    window.location.reload();
                };
                input.click();
            };

            const handleNuclearReset = async () => {

                for (const storeName of storeNames) {
                    if (db.objectStoreNames.contains(storeName)) {
                        const tx = db.transaction(storeName, 'readwrite');
                        tx.objectStore(storeName).clear();
                        await new Promise(r => { tx.oncomplete = r; });
                    }

                                            background: '#2a1520', borderRadius: '16px', padding: '24px',
                                            maxWidth: '300px', width: '100%',
                                            border: '1px solid rgba(139,58,98,0.3)',

                                        <div style={{ fontSize: '16px', fontWeight: '700', color: '#e8d0d0', marginBottom: '12px' }}>
                                            Duplicate Warning

                                        <div style={{ fontSize: '13px', color: '#c77da0', lineHeight: '1.5', marginBottom: '20px' }}>
                                            When enabled, the app will check for exercises with similar names when you create a new one. This helps prevent accidentally adding duplicates like "Bench Press" and "Bench press" as separate exercises.
                                        </div>
                                        <button
                                            onClick={() => setShowDupInfo(false)}
                                            style={{
                                                width: '100%', padding: '12px', border: 'none', borderRadius: '10px',
                                                background: '#8b3a62', color: '#fff', fontSize: '15px', fontWeight: '600',
                                                cursor: 'pointer', WebkitAppearance: 'none',
                                            }}
                                        >
                                            Got it
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const ChangeCategoryModal = ({ exercise, onSave, onCancel, categories, dayLabel }) => {
            const [selected, setSelected] = useState(getExCategories(exercise));

            const handleSave = async () => {
                const updated = { ...exercise, category: selected.length > 0 ? selected[0] : '', categories: selected };
                const ok = await safeDb(() => dbOps.exercises.update(updated), 'update splits');
                if (ok) onSave();
            };

            const toggleCat = (cat) => {
                setSelected(prev => prev.includes(cat) ? prev.filter(c => c !== cat) : [...prev, cat]);
            };

            return (
                <div className="modal-overlay" onClick={onCancel}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header" {...makeSwipeDownHandlers(onCancel)}>
                            <h2>Assign Splits</h2>
                            <button className="close-btn" onClick={onCancel}>x</button>
                        </div>
                        <div className="modal-content">
                            {dayLabel && <div style={{ fontSize: '12px', color: '#8b3a62', marginBottom: '8px', textAlign: 'center' }}>Today's split: {dayLabel}</div>}
                            <p style={{ color: 'rgba(199,125,160,0.5)', marginBottom: '12px' }}>Current: {formatCategories(exercise) || 'None'}</p>
                            <p style={{ color: 'rgba(199,125,160,0.35)', fontSize: '11px', marginBottom: '12px' }}>Tap multiple to assign to more than one split</p>
                            <div className="button-grid">
                                {categories.map(cat => (
                                    <button key={cat} className={`btn ${selected.includes(cat) ? 'active' : ''}`} onClick={() => toggleCat(cat)}>
                                        {cat.charAt(0).toUpperCase() + cat.slice(1)}
                                    </button>
                                ))}
                            </div>
                            <button onClick={handleSave} style={{ width: '100%', padding: '12px', marginTop: '16px', border: 'none', borderRadius: '8px', background: '#8b3a62', color: '#fff', fontSize: '14px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none' }}>
                                Save
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ConfirmationDialog = ({ title, message, onConfirm, onCancel }) => {
            return (
                <div className="modal-overlay" onClick={onCancel}>
                    <div className="confirmation-dialog" onClick={(e) => e.stopPropagation()}>
                        <div className="confirmation-title">{title}</div>
                        <div className="confirmation-message">{message}</div>
                        <div className="confirmation-buttons">
                            <button className="btn-cancel" onClick={onCancel}>Cancel</button>
                            <button className="btn-confirm" onClick={onConfirm}>Delete</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ============ MAIN APP ============

        
        const getCategories = async () => {
            const record = await dbOps.dayNotes.get('__categories__');
            if (record && record.note) {
                try { return JSON.parse(record.note); } catch(e) {}
            }
            return ['push', 'pull', 'legs', 'core', 'cardio', 'mobility', 'stretch', 'other'];
        };

        const saveCategories = async (cats) => {
            await dbOps.dayNotes.set('__categories__', JSON.stringify(cats));
        };

        const DayDetailModal = ({ date, onClose, dayLabel, categories, onSplitChange, unit }) => {
            const [activeTab, setActiveTab] = useState(dayLabel ? 'activities' : 'split');
            const [activities, setActivities] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [sessionNotes, setSessionNotes] = useState({});
            const [allHistory, setAllHistory] = useState({});
            const [pullDownY, setPullDownY] = useState(0);
            const [templateSplit, setTemplateSplit] = useState('');
            const detailTouchRef = useRef(null);
            const detailContentRef = useRef(null);
            const pullDownRef = useRef(null);
            const modalRef = useRef(null);

            useEffect(() => {
                const d = parseLocalDate(date);
                const dow = d.getDay();
                dbOps.templates.get(dow).then(t => setTemplateSplit(t?.label || ''));
            }, [date]);

            useEffect(() => {
                if (!dayLabel) return;
                const load = async () => {
                    // Load ALL exercises that match the split's category (lowercase match)
                    const allExercises = await dbOps.exercises.getAll();
                    const splitLower = dayLabel.toLowerCase();
                    const matching = allExercises.filter(ex => getExCategories(ex).includes(splitLower));
                    matching.sort((a, b) => (b.lastUsed || '').localeCompare(a.lastUsed || ''));
                    setActivities(matching);

                    const histMap = {};
                    const noteMap = {};
                    for (const ex of matching) {
                        const allSets = await dbOps.sets.getByExerciseId(ex.id);
                        const byDate = {};
                        allSets.forEach(s => {
                            if (!byDate[s.date]) byDate[s.date] = [];
                            byDate[s.date].push(s);
                        });
                        histMap[ex.id] = Object.keys(byDate).sort().reverse().map(d => ({
                            date: d, sets: byDate[d].sort((a, b) => a.setOrder - b.setOrder)
                        }));
                        const notes = await dbOps.sessionNotes.getByExerciseId(ex.id);
                        notes.forEach(n => { noteMap[`${n.exerciseId}_${n.date}`] = n; });
                    }
                    setAllHistory(histMap);
                    setSessionNotes(noteMap);
                };
                load();
            }, [dayLabel]);

            const handleDetailTouchStart = (e) => {
                if (activeTab !== 'activities') return;
                detailTouchRef.current = { startX: e.touches[0].clientX, startY: e.touches[0].clientY, startTime: Date.now(), axis: null };
            };
            const handleDetailTouchMove = (e) => {
                if (!detailTouchRef.current || activeTab !== 'activities') return;
                const dx = e.touches[0].clientX - detailTouchRef.current.startX;
                const dy = e.touches[0].clientY - detailTouchRef.current.startY;
                if (detailTouchRef.current.axis === null) {
                    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                        if (Math.abs(dx) > Math.abs(dy)) {
                            detailTouchRef.current.axis = 'horizontal';
                            e.preventDefault();
                        } else {
                            detailTouchRef.current.axis = 'vertical';
                        }
                    }
                }
            };
            const handleDetailTouchEnd = (e) => {
                if (!detailTouchRef.current || activeTab !== 'activities') return;
                const dx = e.changedTouches[0].clientX - detailTouchRef.current.startX;
                const dt = Date.now() - detailTouchRef.current.startTime;
                const axis = detailTouchRef.current.axis;
                detailTouchRef.current = null;
                if (axis === 'vertical') return;
                if (Math.abs(dx) > 60 && dt < 400) {
                    const el = detailContentRef.current;
                    const direction = dx > 0 ? 1 : -1;
                    const newIdx = direction > 0 ? Math.max(0, currentIdx - 1) : Math.min(activities.length - 1, currentIdx + 1);
                    if (newIdx !== currentIdx && el) {
                        el.style.transform = `translateX(${direction * 80}px)`;
                        el.style.opacity = '0';
                        setTimeout(() => {
                            el.style.transition = 'none';
                            el.style.transform = `translateX(${-direction * 80}px)`;
                            setCurrentIdx(newIdx);
                            requestAnimationFrame(() => {
                                el.style.transition = 'transform 0.2s ease-out, opacity 0.2s ease-out';
                                el.style.transform = 'translateX(0)';
                                el.style.opacity = '1';
                            });
                        }, 120);
                    }
                }
            };

            const handlePullDownTouchStart = (e) => {
                const contentEl = detailContentRef.current;
                if (contentEl && contentEl.scrollTop === 0) {
                    pullDownRef.current = { startY: e.touches[0].clientY, startTime: Date.now() };
                }
            };

            const handlePullDownTouchMove = (e) => {
                if (!pullDownRef.current) return;
                const dy = e.touches[0].clientY - pullDownRef.current.startY;
                if (dy > 0) {
                    setPullDownY(dy);
                    const contentEl = detailContentRef.current;
                    if (contentEl) {
                        contentEl.style.transform = `translateY(${dy}px)`;
                        contentEl.style.opacity = 1 - (dy / 200);
                    }
                }
            };

            const handlePullDownTouchEnd = (e) => {
                if (!pullDownRef.current) return;
                const dy = pullDownY;
                pullDownRef.current = null;
                const contentEl = detailContentRef.current;
                if (dy > 120) {
                    if (contentEl) {
                        contentEl.style.transform = 'translateY(100vh)';
                        contentEl.style.opacity = '0';
                    }
                    setTimeout(() => {
                        onClose();
                    }, 150);
                } else {
                    if (contentEl) {
                        contentEl.style.transition = 'transform 0.2s ease-out, opacity 0.2s ease-out';
                        contentEl.style.transform = 'translateY(0)';
                        contentEl.style.opacity = '1';
                    }
                    setPullDownY(0);
                }
            };

            const handleSplitSelect = (split) => {
                onSplitChange(split);
                setActiveTab('activities');
            };

            const act = activities[currentIdx];
            const history = act ? (allHistory[act.id] || []) : [];

            const splitOptions = [...new Set([...(categories || [])].map(c => c.charAt(0).toUpperCase() + c.slice(1)))];

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" ref={modalRef} style={{ height: '100vh', maxHeight: '100vh', top: 0, bottom: 0 }} onClick={(e) => e.stopPropagation()} onTouchStart={handleDetailTouchStart} onTouchMove={handleDetailTouchMove} onTouchEnd={handleDetailTouchEnd}>
                        <div style={{ display: 'flex', justifyContent: 'center', paddingTop: '8px', paddingBottom: '4px' }}>
                            <div style={{ width: '40px', height: '4px', borderRadius: '2px', background: '#555' }}></div>
                        </div>
                        <div className="modal-header" onTouchStart={handlePullDownTouchStart} onTouchMove={handlePullDownTouchMove} onTouchEnd={handlePullDownTouchEnd}>
                            <h2>{formatDateShort(date)}</h2>
                            <button className="close-btn" onClick={onClose}>x</button>
                        </div>
                        <div className="modal-content" style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
                            {dayLabel ? (
                                <>
                                    <div style={{ display: 'flex', gap: '0', marginBottom: '12px', flexShrink: 0 }}>
                                        <button
                                            onClick={() => setActiveTab('activities')}
                                            style={{
                                                flex: 1, padding: '10px 0', border: 'none', fontSize: '13px', fontWeight: '600',
                                                cursor: 'pointer', WebkitAppearance: 'none',
                                                background: activeTab === 'activities' ? '#8b3a62' : 'rgba(255,255,255,0.05)',
                                                color: activeTab === 'activities' ? '#fff' : '#999',
                                                borderRadius: '8px 0 0 8px',
                                            }}
                                        >
                                            {dayLabel} Day Activities
                                        </button>
                                        <button
                                            onClick={() => setActiveTab('split')}
                                            style={{
                                                flex: 1, padding: '10px 0', border: 'none', fontSize: '13px', fontWeight: '600',
                                                cursor: 'pointer', WebkitAppearance: 'none',
                                                background: activeTab === 'split' ? '#8b3a62' : 'rgba(255,255,255,0.05)',
                                                color: activeTab === 'split' ? '#fff' : '#999',
                                                borderRadius: '0 8px 8px 0',
                                            }}
                                        >
                                            Change Split
                                        </button>
                                    </div>

                                    {activeTab === 'activities' && (
                                        <>
                                            {activities.length > 0 && (
                                                <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', padding: '4px 0 8px', gap: '8px', flexShrink: 0 }}>
                                                    <button onClick={() => currentIdx > 0 && setCurrentIdx(currentIdx - 1)} style={{ background: 'none', border: 'none', color: currentIdx > 0 ? '#8b3a62' : '#333', fontSize: '18px', padding: '4px 8px', cursor: 'pointer', WebkitAppearance: 'none' }}>&lt;</button>
                                                    <div style={{ fontSize: '14px', fontWeight: '700', color: '#e8c1d0', textTransform: 'uppercase', letterSpacing: '0.5px', textAlign: 'center', flex: 1 }}>{act?.name}</div>
                                                    <button onClick={() => currentIdx < activities.length - 1 && setCurrentIdx(currentIdx + 1)} style={{ background: 'none', border: 'none', color: currentIdx < activities.length - 1 ? '#8b3a62' : '#333', fontSize: '18px', padding: '4px 8px', cursor: 'pointer', WebkitAppearance: 'none' }}>&gt;</button>
                                                </div>
                                            )}
                                            {activities.length > 1 && (
                                                <div style={{ padding: '0 0 8px', display: 'flex', justifyContent: 'center', gap: '6px', flexShrink: 0 }}>
                                                    {activities.map((_, i) => (
                                                        <div key={i} style={{ width: '7px', height: '7px', borderRadius: '50%', background: i === currentIdx ? '#e8c8d8' : 'rgba(232,200,216,0.25)', cursor: 'pointer', transition: 'background 0.2s' }} onClick={() => setCurrentIdx(i)} />
                                                    ))}
                                                </div>
                                            )}
                                            <div ref={detailContentRef} style={{ flex: 1, overflow: 'auto', transition: 'transform 0.2s ease-out, opacity 0.2s ease-out' }}>
                                                {history.length === 0 ? (
                                                    <div style={{ textAlign: 'center', color: '#666', marginTop: 40 }}>No history yet for {act?.name}</div>
                                                ) : (
                                                    history.map((session, idx) => {
                                                        const note = sessionNotes[`${act.id}_${session.date}`];
                                                        return (
                                                            <div key={idx} style={{ paddingBottom: '12px', marginBottom: '12px', borderBottom: idx < history.length - 1 ? '1px solid rgba(255,255,255,0.06)' : 'none' }}>
                                                                <div className="history-date">{formatDateShort(session.date)}</div>
                                                                <div className="set-boxes-container">
                                                                    {session.sets.map((s, sidx) => (
                                                                        <div key={sidx} className="set-box" style={{ backgroundColor: getSetBoxColor(sidx) }}>
                                                                            {formatSetBox(s, session.sets[sidx - 1], unit)}
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                                {note && (
                                                                    <div style={{ marginTop: '8px' }}>
                                                                        {(note.mood || note.tags) && (
                                                                            <div style={{ marginBottom: '6px' }}>
                                                                                {note.mood && (
                                                                                    <div style={{ fontSize: '12px', color: '#c77da0' }}>
                                                                                        {getMoodLabel(note.mood)}
                                                                                    </div>
                                                                                )}
                                                                                {!note.mood && note.tags && note.tags.length > 0 && (
                                                                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
                                                                                        {note.tags.map(tag => (
                                                                                            <span key={tag} style={{ padding: '2px 8px', borderRadius: '12px', background: 'rgba(139, 58, 98, 0.2)', color: '#7b93f5', fontSize: '11px' }}>{tag}</span>
                                                                                        ))}
                                                                                    </div>
                                                                                )}
                                                                            </div>
                                                                        )}
                                                                        {note.formCueText && <div style={{ fontSize: '12px', color: 'rgba(199,125,160,0.5)', marginBottom: '4px' }}><strong>Form:</strong> {note.formCueText}</div>}
                                                                        {note.freeText && <div style={{ fontSize: '12px', color: 'rgba(199,125,160,0.5)' }}>{note.freeText}</div>}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })
                                                )}
                                            </div>
                                            {activities.length === 0 && (
                                                <div style={{ textAlign: 'center', color: '#666', marginTop: 40 }}>No {dayLabel.toLowerCase()} activities found yet</div>
                                            )}
                                        </>
                                    )}
                                </>
                            ) : (
                                <div style={{ textAlign: 'center', color: '#666', marginTop: 40, padding: '0 20px' }}>
                                    <div style={{ fontSize: '15px', marginBottom: '20px' }}>Assign a split category to today</div>
                                </div>
                            )}

                            {(activeTab === 'split' || !dayLabel) && (
                                <div style={{ padding: '8px 0' }}>
                                    <div className="button-grid">
                                        {splitOptions.map(opt => (
                                            <button
                                                key={opt}
                                                className={`btn ${dayLabel === opt ? 'active' : ''}`}
                                                onClick={() => handleSplitSelect(opt)}
                                            >
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                    {dayLabel && (
                                        <button
                                            className="btn btn-secondary"
                                            onClick={() => { onSplitChange(''); onClose(); }}
                                            style={{ marginTop: '8px' }}
                                        >
                                            Remove Split
                                        </button>
                                    )}
                                    {templateSplit && templateSplit !== dayLabel && (
                                        <button
                                            className="btn btn-secondary"
                                            onClick={() => { onSplitChange(templateSplit); }}
                                            style={{ marginTop: '8px' }}
                                        >
                                            Restore to Weekly Template ({templateSplit})
                                        </button>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ============ ACTIVITY CONTEXT MODAL ============
        const QUICK_NOTE_SECTIONS = [
            { label: 'Physical Sensations', items: ['Left shoulder pain', 'Right shoulder pain', 'Lower back tight', 'Knee discomfort', 'Wrist strain', 'Hip flexor tight', 'Neck stiff', 'Elbow pain', 'Ankle issue', 'Hamstring tight'] },
            { label: 'Energy & Performance', items: ['Feeling strong today', 'Low energy', 'Sluggish warm-up', 'Second wind kicked in', 'Peak performance', 'Running on fumes', 'Caffeine boost', 'Felt explosive'] },
            { label: 'Form & Technique', items: ['Great mind-muscle connection', 'Form breaking down', 'Grip failing', 'Balance was off', 'Range of motion improved', 'Tempo was good', 'Struggled with lockout', 'Good stretch at bottom'] },
            { label: 'Recovery & Context', items: ['Poor sleep last night', 'Sore from yesterday', 'First day back', 'Post-rest day energy', 'Deload week', 'Coming back from injury', 'Ate well today', 'Skipped meal before'] },
            { label: 'Mental & Motivation', items: ['Didn\'t want to be here', 'Crushed it', 'Pushed through plateau', 'Lost focus', 'In the zone', 'Nervous about weight', 'Confident today', 'Just going through motions'] },
        ];

        const ActivityContextModal = ({ exerciseId, exerciseName, defaultTab, currentDate, onClose, onAction, onNavigate, categories, inlineFormCue, setInlineFormCue, inlineNote, setInlineNote, selectedQuickNotes, setSelectedQuickNotes }) => {
            const [tab, setTab] = useState(defaultTab || 'history');
            const [notesTab, setNotesTab] = useState('custom');
            const [history, setHistory] = useState([]);
            const [exercise, setExercise] = useState(null);
            const [customNoteText, setCustomNoteText] = useState('');
            const [formCueText, setFormCueText] = useState('');
            const [pastNotes, setPastNotes] = useState([]);
            const [pastFormCues, setPastFormCues] = useState([]);
            const [quickNoteFreq, setQuickNoteFreq] = useState({});
            const [collapsedSections, setCollapsedSections] = useState(() => {
                try { return JSON.parse(getPref('qnCollapsed_' + exerciseId, '{}') || '{}'); } catch(e) { return {}; }
            });

            // Load data
            useEffect(() => {
                (async () => {
                    // Exercise record
                    const fullEx = await dbOps.exercises.get(exerciseId);
                    if (fullEx) setExercise(fullEx);
                    // History
                    const allSets = await dbOps.sets.getAll();
                    const exSets = allSets.filter(s => s.exerciseId === exerciseId);
                    const grouped = {};
                    exSets.forEach(s => {
                        if (!grouped[s.date]) grouped[s.date] = [];
                        grouped[s.date].push(s);
                    });
                    const dates = Object.keys(grouped).sort().reverse();
                    setHistory(dates.map(d => ({ date: d, sets: grouped[d].sort((a,b) => (a.setOrder||0) - (b.setOrder||0)) })));

                    // Notes & form cues
                    const allNotes = await dbOps.sessionNotes.getAll();
                    const exNotes = allNotes.filter(n => n.exerciseId === exerciseId);
                    const notes = exNotes.filter(n => n.freeText).map(n => ({ date: n.date, text: n.freeText })).sort((a,b) => b.date.localeCompare(a.date));
                    const cues = exNotes.filter(n => n.formCueText).map(n => ({ date: n.date, text: n.formCueText })).sort((a,b) => b.date.localeCompare(a.date));
                    setPastNotes(notes);
                    setPastFormCues(cues);

                    // Current note/cue
                    const todayNote = exNotes.find(n => n.date === currentDate);
                    if (todayNote) {
                        setCustomNoteText(todayNote.freeText || '');
                        setFormCueText(todayNote.formCueText || '');
                    }

                    // Quick note frequency (global)
                    const freqRecord = await dbOps.dayNotes.get('__quicknote_freq__');
                    if (freqRecord && freqRecord.note) {
                        try { setQuickNoteFreq(JSON.parse(freqRecord.note)); } catch(e) {}
                    }
                })();
            }, []);

            const saveCollapsed = (c) => {
                setCollapsedSections(c);
                setPref('qnCollapsed_' + exerciseId, JSON.stringify(c));
            };

            const toggleSection = (label) => {
                saveCollapsed({ ...collapsedSections, [label]: !collapsedSections[label] });
            };

            const allCollapsed = QUICK_NOTE_SECTIONS.every(s => collapsedSections[s.label]);
            const allExpanded = QUICK_NOTE_SECTIONS.every(s => !collapsedSections[s.label]);

            const handleQuickNoteSelect = (chip) => {
                setSelectedQuickNotes(prev => {
                    const current = prev[exerciseId] || [];
                    const isSelected = current.includes(chip);
                    return { ...prev, [exerciseId]: isSelected ? current.filter(c => c !== chip) : [...current, chip] };
                });
                // Update global frequency
                setQuickNoteFreq(prev => {
                    const updated = { ...prev, [chip]: (prev[chip] || 0) + 1 };
                    debounce('qnfreq', () => safeDb(() => dbOps.dayNotes.set('__quicknote_freq__', JSON.stringify(updated)), 'save freq'), 500);
                    return updated;
                });
            };

            const saveNote = async (type) => {
                const existing = await dbOps.sessionNotes.getByExerciseAndDate(exerciseId, currentDate);
                if (existing) {
                    if (type === 'custom') existing.freeText = customNoteText;
                    if (type === 'formcue') existing.formCueText = formCueText;
                    if (type === 'quicknotes') existing.tags = selectedQuickNotes[exerciseId] || [];
                    await safeDb(() => dbOps.sessionNotes.add(existing), 'save note');
                } else {
                    await safeDb(() => dbOps.sessionNotes.add({
                        id: generateId('sn'), exerciseId, exerciseName, date: currentDate,
                        mood: null, tags: type === 'quicknotes' ? (selectedQuickNotes[exerciseId] || []) : [],
                        formCueText: type === 'formcue' ? formCueText : '',
                        freeText: type === 'custom' ? customNoteText : '',
                    }), 'save note');
                }
                if (type === 'custom') {
                    setInlineNote(prev => ({ ...prev, [exerciseId]: customNoteText }));
                    if (customNoteText.trim()) {
                        setPastNotes(prev => {
                            const exists = prev.some(n => n.date === currentDate);
                            if (exists) return prev.map(n => n.date === currentDate ? { ...n, text: customNoteText } : n);
                            return [{ date: currentDate, text: customNoteText }, ...prev];
                        });
                    }
                }
                if (type === 'formcue') {
                    setInlineFormCue(prev => ({ ...prev, [exerciseId]: formCueText }));
                    if (formCueText.trim()) {
                        setPastFormCues(prev => {
                            const exists = prev.some(n => n.date === currentDate);
                            if (exists) return prev.map(n => n.date === currentDate ? { ...n, text: formCueText } : n);
                            return [{ date: currentDate, text: formCueText }, ...prev];
                        });
                    }
                }
            };

            // Get used notes sorted by frequency
            const usedNotes = Object.entries(quickNoteFreq)
                .filter(([k, v]) => v > 0)
                .sort((a, b) => b[1] - a[1])
                .map(([k]) => k);

            const chipStyle = (chip) => ({
                padding: '6px 12px', borderRadius: '16px', fontSize: '11px', fontWeight: '500', cursor: 'pointer', WebkitAppearance: 'none',
                border: (selectedQuickNotes[exerciseId] || []).includes(chip) ? 'none' : '1px solid rgba(139,58,98,0.3)',
                background: (selectedQuickNotes[exerciseId] || []).includes(chip) ? '#8b3a62' : 'rgba(139,58,98,0.1)',
                color: (selectedQuickNotes[exerciseId] || []).includes(chip) ? '#fff' : '#c77da0',
            });

            const formatSetDisplay = (set) => {
                const w = set.weightType === 'bodyweight' ? 'BW' : set.weight ? `${set.weight} ${set.weightType}` : '';
                const r = set.reps ? `${set.reps} reps` : '';
                const d = set.duration ? (set.duration >= 60 ? Math.floor(set.duration/60) + 'm' + (set.duration%60 ? set.duration%60+'s':'') : set.duration + 's') : '';
                return [w, r, d].filter(Boolean).join(' x ');
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" style={{ height: '100vh', maxHeight: '100vh', top: 0, bottom: 0, display: 'flex', flexDirection: 'column' }} onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header" {...makeSwipeDownHandlers(onClose)}>
                            <h2>{exerciseName}</h2>
                            <button className="close-btn" onClick={onClose}>x</button>
                        </div>

                        {/* 3-segment tab control */}
                        <div style={{ display: 'flex', margin: '0 16px 8px', borderRadius: '8px', overflow: 'hidden', border: '1px solid rgba(139,58,98,0.3)' }}>
                            {['history', 'notes', 'edit'].map(t => (
                                <button key={t} onClick={() => setTab(t)} style={{
                                    flex: 1, padding: '10px 0', border: 'none', fontSize: '13px', fontWeight: '600',
                                    cursor: 'pointer', WebkitAppearance: 'none',
                                    background: tab === t ? '#8b3a62' : 'rgba(255,255,255,0.05)',
                                    color: tab === t ? '#fff' : '#999',
                                    borderRadius: 0,
                                }}>{t.charAt(0).toUpperCase() + t.slice(1)}</button>
                            ))}
                        </div>

                        <div className="modal-content" style={{ flex: 1, overflow: 'auto', padding: '8px 16px' }}>
                            {/* ===== HISTORY TAB ===== */}
                            {tab === 'history' && (
                                <div>
                                    {history.length === 0 ? (
                                        <div style={{ textAlign: 'center', color: '#666', padding: '40px 0', fontSize: '13px' }}>No history yet</div>
                                    ) : history.map(day => (
                                        <div key={day.date} style={{ marginBottom: '14px', cursor: 'pointer', padding: '8px', borderRadius: '8px', border: '1px solid rgba(139,58,98,0.1)' }}
                                            onClick={() => onNavigate && onNavigate(day.date, exerciseId)}
                                        >
                                            <div style={{ fontSize: '11px', color: 'rgba(199,125,160,0.5)', fontWeight: '600', marginBottom: '6px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                <span>{day.date}</span>
                                                <span style={{ fontSize: '10px', color: 'rgba(199,125,160,0.3)' }}>tap to go →</span>
                                            </div>
                                            {day.sets.map((set, si) => (
                                                <div key={set.id} style={{ padding: '6px 10px', marginBottom: '3px', borderRadius: '6px', background: 'rgba(139,58,98,0.05)', fontSize: '12px', color: '#e8c1d0', display: 'flex', justifyContent: 'space-between' }}>
                                                    <span>Set {set.setOrder || si+1}</span>
                                                    <span style={{ color: '#c77da0' }}>{formatSetDisplay(set)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* ===== NOTES TAB ===== */}
                            {tab === 'notes' && (
                                <div>
                                    {/* Notes sub-tabs */}
                                    <div style={{ display: 'flex', gap: '4px', marginBottom: '12px' }}>
                                        {[{k:'custom',l:'Custom Notes'},{k:'quick',l:'Quick Notes'},{k:'formcue',l:'Form Cues'}].map(st => (
                                            <button key={st.k} onClick={() => setNotesTab(st.k)} style={{
                                                flex: 1, padding: '7px 4px', border: 'none', borderRadius: '6px', fontSize: '10px', fontWeight: '600',
                                                cursor: 'pointer', WebkitAppearance: 'none',
                                                background: notesTab === st.k ? 'rgba(139,58,98,0.2)' : 'rgba(139,58,98,0.05)',
                                                color: notesTab === st.k ? '#e8c1d0' : '#999',
                                            }}>{st.l}</button>
                                        ))}
                                    </div>

                                    {/* Custom Notes */}
                                    {notesTab === 'custom' && (
                                        <div>
                                            <div style={{ display: 'flex', gap: '6px', marginBottom: '12px' }}>
                                                <input type="text" value={customNoteText} onChange={(e) => setCustomNoteText(e.target.value)} placeholder="Add a note..."
                                                    style={{ flex: 1, padding: '10px', borderRadius: '8px', border: '1px solid rgba(139,58,98,0.3)', background: 'rgba(255,255,255,0.04)', color: '#e8c1d0', fontSize: '13px' }} />
                                                <button onClick={() => saveNote('custom')} style={{ padding: '10px 16px', borderRadius: '8px', border: 'none', background: '#8b3a62', color: '#fff', fontSize: '12px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none' }}>Add</button>
                                            </div>
                                            {pastNotes.length > 0 && pastNotes.map((n, i) => (
                                                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 12px', borderBottom: '1px solid rgba(139,58,98,0.08)', alignItems: 'center' }}>
                                                    <span style={{ fontSize: '13px', color: '#e8d0d0' }}>{n.text}</span>
                                                    <span style={{ fontSize: '10px', color: 'rgba(199,125,160,0.4)', flexShrink: 0, marginLeft: '8px' }}>{n.date}</span>
                                                </div>
                                            ))}
                                            {pastNotes.length === 0 && (
                                                <div style={{ textAlign: 'center', color: '#666', padding: '20px', fontSize: '12px' }}>No notes yet</div>
                                            )}
                                        </div>
                                    )}

                                    {/* Quick Notes */}
                                    {notesTab === 'quick' && (
                                        <div>
                                            {/* Collapse/Expand control */}
                                            <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: '10px' }}>
                                                <div style={{ display: 'flex', borderRadius: '6px', overflow: 'hidden', border: '1px solid rgba(139,58,98,0.2)' }}>
                                                    <button onClick={() => { const c = {}; QUICK_NOTE_SECTIONS.forEach(s => c[s.label] = true); saveCollapsed(c); }}
                                                        style={{ padding: '4px 10px', border: 'none', fontSize: '10px', fontWeight: '500', cursor: 'pointer', WebkitAppearance: 'none',
                                                            background: allCollapsed ? 'rgba(139,58,98,0.2)' : 'rgba(139,58,98,0.04)', color: allCollapsed ? '#e8c1d0' : 'rgba(199,125,160,0.3)' }}>Collapse</button>
                                                    <button onClick={() => saveCollapsed({})}
                                                        style={{ padding: '4px 10px', border: 'none', fontSize: '10px', fontWeight: '500', cursor: 'pointer', WebkitAppearance: 'none',
                                                            background: allExpanded ? 'rgba(139,58,98,0.2)' : 'rgba(139,58,98,0.04)', color: allExpanded ? '#e8c1d0' : 'rgba(199,125,160,0.3)' }}>Expand</button>
                                                </div>
                                            </div>

                                            {/* Previously Used section */}
                                            {usedNotes.length > 0 && (
                                                <div style={{ marginBottom: '12px' }}>
                                                    <div onClick={() => toggleSection('__used__')} style={{ fontSize: '10px', textTransform: 'uppercase', color: 'rgba(199,125,160,0.5)', marginBottom: '6px', fontWeight: '600', cursor: 'pointer', display: 'flex', justifyContent: 'space-between' }}>
                                                        <span>Previously Used</span>
                                                        <span>{collapsedSections['__used__'] ? '+' : '-'}</span>
                                                    </div>
                                                    {!collapsedSections['__used__'] && (
                                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
                                                            {usedNotes.map(chip => (
                                                                <button key={chip} onClick={() => handleQuickNoteSelect(chip)} style={chipStyle(chip)}>{chip}</button>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            )}

                                            {/* Category sections */}
                                            {QUICK_NOTE_SECTIONS.map(section => (
                                                <div key={section.label} style={{ marginBottom: '10px' }}>
                                                    <div onClick={() => toggleSection(section.label)} style={{ fontSize: '10px', textTransform: 'uppercase', color: 'rgba(199,125,160,0.5)', marginBottom: '6px', fontWeight: '600', cursor: 'pointer', display: 'flex', justifyContent: 'space-between' }}>
                                                        <span>{section.label}</span>
                                                        <span>{collapsedSections[section.label] ? '+' : '-'}</span>
                                                    </div>
                                                    {!collapsedSections[section.label] && (
                                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
                                                            {section.items.map(chip => (
                                                                <button key={chip} onClick={() => handleQuickNoteSelect(chip)} style={chipStyle(chip)}>{chip}</button>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}

                                            <button onClick={() => saveNote('quicknotes')} style={{ width: '100%', marginTop: '8px', padding: '12px', borderRadius: '8px', background: '#8b3a62', border: 'none', color: '#fff', fontSize: '14px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none' }}>Save</button>
                                        </div>
                                    )}

                                    {/* Form Cues */}
                                    {notesTab === 'formcue' && (
                                        <div>
                                            <div style={{ display: 'flex', gap: '6px', marginBottom: '12px' }}>
                                                <input type="text" value={formCueText} onChange={(e) => setFormCueText(e.target.value)} placeholder="Add a form cue..."
                                                    style={{ flex: 1, padding: '10px', borderRadius: '8px', border: '1px solid rgba(139,58,98,0.3)', background: 'rgba(255,255,255,0.04)', color: '#e8c1d0', fontSize: '13px' }} />
                                                <button onClick={() => saveNote('formcue')} style={{ padding: '10px 16px', borderRadius: '8px', border: 'none', background: '#8b3a62', color: '#fff', fontSize: '12px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none' }}>Add</button>
                                            </div>
                                            {pastFormCues.length > 0 && pastFormCues.map((n, i) => (
                                                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 12px', borderBottom: '1px solid rgba(139,58,98,0.08)', alignItems: 'center' }}>
                                                    <span style={{ fontSize: '13px', color: '#e8d0d0' }}>{n.text}</span>
                                                    <span style={{ fontSize: '10px', color: 'rgba(199,125,160,0.4)', flexShrink: 0, marginLeft: '8px' }}>{n.date}</span>
                                                </div>
                                            ))}
                                            {pastFormCues.length === 0 && (
                                                <div style={{ textAlign: 'center', color: '#666', padding: '20px', fontSize: '12px' }}>No form cues yet</div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* ===== EDIT TAB ===== */}
                            {tab === 'edit' && (
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', paddingTop: '8px' }}>
                                    <button onClick={() => { onAction('changeCategory'); onClose(); }} style={{
                                        width: '100%', padding: '14px', borderRadius: '10px', border: '1px solid rgba(139,58,98,0.2)', background: 'rgba(139,58,98,0.05)',
                                        color: '#e8c1d0', fontSize: '14px', fontWeight: '500', cursor: 'pointer', WebkitAppearance: 'none', textAlign: 'left',
                                    }}>Change Split</button>
                                    <button onClick={() => { onAction('changeType'); onClose(); }} style={{
                                        width: '100%', padding: '14px', borderRadius: '10px', border: '1px solid rgba(139,58,98,0.2)', background: 'rgba(139,58,98,0.05)',
                                        color: '#e8c1d0', fontSize: '14px', fontWeight: '500', cursor: 'pointer', WebkitAppearance: 'none', textAlign: 'left',
                                        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                    }}>
                                        <span>Change Type</span>
                                        <span style={{ fontSize: '11px', color: 'rgba(199,125,160,0.5)' }}>{exercise?.type === 'timed' ? 'timed' : 'reps'}</span>
                                    </button>
                                    <button onClick={() => { onAction('changeWeightDefault'); onClose(); }} style={{
                                        width: '100%', padding: '14px', borderRadius: '10px', border: '1px solid rgba(139,58,98,0.2)', background: 'rgba(139,58,98,0.05)',
                                        color: '#e8c1d0', fontSize: '14px', fontWeight: '500', cursor: 'pointer', WebkitAppearance: 'none', textAlign: 'left',
                                        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                    }}>
                                        <span>Weight Prompt</span>
                                        <span style={{ fontSize: '11px', color: 'rgba(199,125,160,0.5)' }}>{exercise?.weightDefault === 'bodyweight' ? 'bodyweight' : exercise?.weightDefault === 'none' ? 'no weight' : 'weight'}</span>
                                    </button>
                                    <button onClick={() => { onAction('rename'); onClose(); }} style={{
                                        width: '100%', padding: '14px', borderRadius: '10px', border: '1px solid rgba(139,58,98,0.2)', background: 'rgba(139,58,98,0.05)',
                                        color: '#e8c1d0', fontSize: '14px', fontWeight: '500', cursor: 'pointer', WebkitAppearance: 'none', textAlign: 'left',
                                    }}>Rename</button>
                                    <button onClick={() => { onAction('delete'); onClose(); }} style={{
                                        width: '100%', padding: '14px', borderRadius: '10px', border: '1px solid rgba(180,60,60,0.2)', background: 'rgba(180,60,60,0.05)',
                                        color: '#e8a0a0', fontSize: '14px', fontWeight: '500', cursor: 'pointer', WebkitAppearance: 'none', textAlign: 'left',
                                    }}>Delete</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [currentDate, setCurrentDate] = useState(getTodayString());
            const [daySets, setDaySets] = useState([]);
            const [exerciseCatsCache, setExerciseCatsCache] = useState({});
            const [dayLabel, setDayLabel] = useState('');
            const [modal, setModalRaw] = useState(null);
            const modalBackRef = useRef(null);
            const setModal = (newModal, backTo) => {
                if (backTo !== undefined) modalBackRef.current = backTo;
                else if (newModal === null) modalBackRef.current = null;
                setModalRaw(newModal);
            };
            const modalBack = () => {
                const back = modalBackRef.current;
                modalBackRef.current = null;
                setModalRaw(back || null);
            };
            const [selectedExercise, setSelectedExercise] = useState(null);
            const [pendingNewExerciseId, setPendingNewExerciseId] = useState(null);
            const [selectedWeight, setSelectedWeight] = useState(null);
            const [previousWeight, setPreviousWeight] = useState(null);
            const [loggedSetCount, setLoggedSetCount] = useState(0);
            const [confirmation, setConfirmation] = useState(null);
            const [expandedExercise, setExpandedExercise] = useState(null);
            const [selectedSetForEdit, setSelectedSetForEdit] = useState(null);
            const [setNumber, setSetNumber] = useState(1);
            const [prefilledReps, setPrefilledReps] = useState(null);
            const [categories, setCategories] = useState(['push', 'pull', 'legs', 'core', 'cardio', 'mobility', 'stretch', 'other']);
            const [unit, setUnit] = useState('lbs');
            const [bodyweight, setBodyweight] = useState(null);
