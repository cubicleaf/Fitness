            const [showBWEditor, setShowBWEditor] = useState(false);
            const [bwEditValue, setBWEditValue] = useState('');
            const [weightBannerDismissed, setWeightBannerDismissed] = useState(false);
            const [bannerSlidingOut, setBannerSlidingOut] = useState(false);
            const [showDisableBannerConfirm, setShowDisableBannerConfirm] = useState(false);
            const bannerLongPressRef = useRef(null);
            const bannerSwipeRef = useRef({ startX: 0, startY: 0, swiping: false });
            const [inlineMood, setInlineMood] = useState({});
            const [inlineFormCue, setInlineFormCue] = useState({});
            const [inlineNote, setInlineNote] = useState({});
            const [showFormCueInput, setShowFormCueInput] = useState(null);
            const [showNoteInput, setShowNoteInput] = useState(null);
            const [showQuickNotes, setShowQuickNotes] = useState(null);
            const [selectedQuickNotes, setSelectedQuickNotes] = useState({});
            const [activityContext, setActivityContext] = useState(null); // { exerciseId, exerciseName, defaultTab: 'history'|'notes'|'edit' }
            const [exerciseLocks, setExerciseLocks] = useState({});
            const [pendingLockType, setPendingLockType] = useState(null);
            const [pillGlowId, setPillGlowId] = useState(null);
            const [renameConfirmData, setRenameConfirmData] = useState(null);
            const [pairingExerciseId, setPairingExerciseId] = useState(null); // exerciseId currently pairing
            const touchRef = useRef(null);
            const contentRef = useRef(null);
            const longPressRef = useRef(null);

            const handleTouchStart = useCallback((e) => {
                if (modal) return; // Don't swipe when a modal is open
                const touch = e.touches[0];
                touchRef.current = { startX: touch.clientX, startY: touch.clientY, startTime: Date.now() };
            }, [modal]);

            const handleTouchEnd = useCallback((e) => {
                if (!touchRef.current || modal) return;
                const touch = e.changedTouches[0];
                const dx = touch.clientX - touchRef.current.startX;
                const dy = touch.clientY - touchRef.current.startY;
                const dt = Date.now() - touchRef.current.startTime;
                touchRef.current = null;
                if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 2 && dt < 400) {
                    const direction = dx > 0 ? 1 : -1; // 1=right(prev), -1=left(next)
                    const el = contentRef.current;
                    if (el) {
                        // Slide out
                        el.style.transform = `translateX(${direction * 100}px)`;
                        el.style.opacity = '0';
                        setTimeout(() => {
                            // Jump to opposite side (invisible)
                            el.style.transition = 'none';
                            el.style.transform = `translateX(${-direction * 100}px)`;
                            // Update date
                            setCurrentDate(prev => addDays(prev, direction > 0 ? -1 : 1));
                            // Force reflow then slide in
                            requestAnimationFrame(() => {
                                el.style.transition = 'transform 0.25s ease-out, opacity 0.25s ease-out';
                                el.style.transform = 'translateX(0)';
                                el.style.opacity = '1';
                            });
                        }, 150);
                    } else {
                        setCurrentDate(prev => addDays(prev, direction > 0 ? -1 : 1));
                    }
                }
            }, [modal]);

            const loadDayData = useCallback(async () => {
                const sets = await dbOps.sets.getByDate(currentDate);
                setDaySets(sets);

                // Cache exercise categories for split tag display
                const uniqueExIds = [...new Set(sets.map(s => s.exerciseId))];
                const catsMap = {};
                for (const exId of uniqueExIds) {
                    const fullEx = await dbOps.exercises.get(exId);
                    if (fullEx) {
                        catsMap[exId] = getExCategories(fullEx);
                        catsMap[exId + '_wd'] = fullEx.weightDefault || 'weight';
                    }
                }
                setExerciseCatsCache(catsMap);

                // Check for per-day split first
                const splitRecord = await dbOps.dayNotes.get(`__split_${currentDate}`);
                if (splitRecord && splitRecord.note) {
                    if (splitRecord.note === '__none__') {
                        setDayLabel('');
                    } else {
                        setDayLabel(splitRecord.note);
                    }
                } else {
                    // No per-day split stored — derive from weekly template
                    const d = parseLocalDate(currentDate);
                    const dayOfWeek = d.getDay();
                    const template = await dbOps.templates.get(dayOfWeek);
                    const templateLabel = template?.label || '';
                    setDayLabel(templateLabel);
                    // Bake the template split into per-day storage for today and past days
                    if (templateLabel && currentDate <= getTodayString()) {
                        await dbOps.dayNotes.set(`__split_${currentDate}`, templateLabel);
                    }
                }
            }, [currentDate]);

            const setDaySplit = async (date, split) => {
                const value = split || '__none__';
                await dbOps.dayNotes.set(`__split_${date}`, value);
                if (date === currentDate) {
                    setDayLabel(value === '__none__' ? '' : split);
                }
            };

            useEffect(() => {
                initDB().then(async () => {
                    await bootstrapDefaultExercises();
                    await loadDayData();
                    const cats = await getCategories();
                    setCategories(cats);
                    // Load unit preference
                    const unitRecord = await dbOps.dayNotes.get('__unit__');
                    if (unitRecord && unitRecord.note) {
                        setUnit(unitRecord.note);
                    }
                    // Load bodyweight
                    const bwRecord = await dbOps.dayNotes.get('__bodyweight__');
                    if (bwRecord && bwRecord.note) {
                        setBodyweight(parseFloat(bwRecord.note));
                    }
                });
            }, [currentDate, loadDayData]);

            useEffect(() => {
                if (!expandedExercise) return;
                const loadExNotes = async () => {
                    const note = await dbOps.sessionNotes.getByExerciseAndDate(expandedExercise, currentDate);
                    if (note) {
                        if (note.mood) setInlineMood(prev => ({ ...prev, [expandedExercise]: convertLegacyMood(note.mood) }));
                        if (note.formCueText) setInlineFormCue(prev => ({ ...prev, [expandedExercise]: note.formCueText }));
                        if (note.freeText) setInlineNote(prev => ({ ...prev, [expandedExercise]: note.freeText }));
                        if (note.tags && note.tags.length > 0) setSelectedQuickNotes(prev => ({ ...prev, [expandedExercise]: note.tags }));
                    }
                };
                loadExNotes();
            }, [expandedExercise, currentDate]);

            const handleExerciseSelect = async (exercise) => {
                if (!exercise) {
                    setModal(null);
                    return;
                }

                setSelectedExercise(exercise);
                setModal('activityHistory');
            };

            const handleCreateExercise = async (exercise) => {
                setSelectedExercise(exercise);
                setPendingNewExerciseId(exercise.id);
                setPreviousWeight(null);
                setSetNumber(1);
                // Bypass weight picker for bodyweight/no-weight exercises
                if (exercise.weightDefault === 'bodyweight' || exercise.weightDefault === 'none') {
                    setSelectedWeight({ weight: null, weightType: 'bodyweight' });
                    if (exercise.type === 'timed') {
                        setModal('timedDuration', 'exercisePicker');
                    } else {
                        setModal('repPicker', 'exercisePicker');
                    }
                    return;
                }
                setModal('weightPicker', 'exercisePicker');
            };

            const handleLogSet = async () => {
                const daySets = await dbOps.sets.getByDate(currentDate);
                const exerciseSets = daySets.filter(s => s.exerciseId === selectedExercise.id);
                setSetNumber(exerciseSets.length + 1);

                const lastSetForExercise = exerciseSets.sort((a, b) => b.setOrder - a.setOrder)[0];
                let suggestedWeight = lastSetForExercise?.weight || null;
                // If no sets today, use last set from last session
                if (!suggestedWeight) {
                    const lastSession = await dbOps.sets.getLastSession(selectedExercise.id);
                    if (lastSession && lastSession.sets.length > 0) {
                        const lastSessionSet = lastSession.sets.sort((a, b) => (b.setOrder || 0) - (a.setOrder || 0))[0];
                        suggestedWeight = lastSessionSet?.weight || null;
                    }
                }
                setPreviousWeight(suggestedWeight);

                // Bypass weight picker for bodyweight/no-weight exercises
                const fullEx = await dbOps.exercises.get(selectedExercise.id);
                if (fullEx?.weightDefault === 'bodyweight' || fullEx?.weightDefault === 'none') {
                    setSelectedWeight({ weight: null, weightType: 'bodyweight' });
                    if (fullEx.type === 'timed') {
                        setModal('timedDuration', 'activityHistory');
                    } else {
                        setModal('repPicker', 'activityHistory');
                    }
                    return;
                }
                setModal('weightPicker', 'activityHistory');
            };

            const handleUniformWeight = async () => {
                setPendingLockType('uniformWeight');
                const daySets = await dbOps.sets.getByDate(currentDate);
                const exerciseSets = daySets.filter(s => s.exerciseId === selectedExercise.id);
                setSetNumber(exerciseSets.length + 1);
                setModal('weightPicker');
                const lastSetForExercise = exerciseSets.sort((a, b) => b.setOrder - a.setOrder)[0];
                setPreviousWeight(lastSetForExercise?.weight || null);
            };

            const handleUniformReps = async () => {
                setPendingLockType('uniformReps');
                const daySets = await dbOps.sets.getByDate(currentDate);
                const exerciseSets = daySets.filter(s => s.exerciseId === selectedExercise.id);
                setSetNumber(exerciseSets.length + 1);
                setModal('weightPicker');
                const lastSetForExercise = exerciseSets.sort((a, b) => b.setOrder - a.setOrder)[0];
                setPreviousWeight(lastSetForExercise?.weight || null);
            };

            const handleBoth = async () => {
                setPendingLockType('both');
                const daySets = await dbOps.sets.getByDate(currentDate);
                const exerciseSets = daySets.filter(s => s.exerciseId === selectedExercise.id);
                setSetNumber(exerciseSets.length + 1);
                setModal('weightPicker');
                const lastSetForExercise = exerciseSets.sort((a, b) => b.setOrder - a.setOrder)[0];
                setPreviousWeight(lastSetForExercise?.weight || null);
            };

            const handleWeightSelected = async (weightData) => {
                if (!weightData) {
                    // Clean up ghost exercise if user backs out before logging a set
                    if (pendingNewExerciseId) {
                        const existingSets = await dbOps.sets.getByExerciseId(pendingNewExerciseId);
                        if (!existingSets || existingSets.length === 0) {
                            await safeDb(() => dbOps.exercises.delete(pendingNewExerciseId), 'cleanup ghost exercise');
                        }
                        setPendingNewExerciseId(null);
                    }
                    modalBack();
                    setSelectedWeight(null);
                    setPreviousWeight(null);
                    setPrefilledReps(null);
                    return;
                }

                setSelectedWeight(weightData);

                if (selectedExercise.type === 'timed') {
                    setModal('timedDuration', 'weightPicker');
                } else if (prefilledReps !== null) {
                    // Auto-save with prefilled reps
                    const daySets = await dbOps.sets.getByDate(currentDate);
                    let exerciseOrder = 1;
                    const existingExercise = daySets.filter(s => s.exerciseId === selectedExercise.id);
                    if (existingExercise.length === 0) {
                        exerciseOrder = Math.max(...daySets.map(s => s.exerciseOrder), 0) + 1;
                    } else {
                        exerciseOrder = existingExercise[0].exerciseOrder;
                    }

                    const maxSetOrderPrefill = existingExercise.reduce((max, s) => Math.max(max, s.setOrder || 0), 0);
                    const setOrder = Math.max(existingExercise.length + 1, maxSetOrderPrefill + 1);

                    const fullExPrefill = await dbOps.exercises.get(selectedExercise.id);
                    const wmPrefill = fullExPrefill?.weightMeaning || 'total';

                    const set = {
                        id: generateId('set'),
                        date: currentDate,
                        exerciseId: selectedExercise.id,
                        exerciseName: selectedExercise.name,
                        exerciseOrder,
                        setOrder,
                        weight: weightData.weight,
                        weightType: weightData.weightType,
                        reps: prefilledReps,
                        duration: null,
                        weightMeaning: wmPrefill,
                        createdAt: Date.now(),
                    };

                    // CHANGE 6: Record bandedColor if present
                    if (weightData.weightType === 'banded' && weightData.bandedColor) {
                        set.bandedColor = weightData.bandedColor;
                    }

                    const ok = await safeDb(() => dbOps.sets.add(set), 'log set');
                    if (!ok) return;

                    const exCopy = { ...selectedExercise, lastUsed: currentDate };
                    await safeDb(() => dbOps.exercises.update(exCopy), 'update exercise');

                    setPendingNewExerciseId(null);
                    setLoggedSetCount(loggedSetCount + 1);
                    setModal(null);
                    setSelectedExercise(null);
                    setSelectedWeight(null);
                    setPreviousWeight(null);
                    setPrefilledReps(null);

                    await loadDayData();
                } else {
                    setModal('repPicker', 'weightPicker');
                }
            };

            const handleRepsSelected = async (reps) => {
                if (reps === null) {
                    if (pendingNewExerciseId) {
                        const existingSets = await dbOps.sets.getByExerciseId(pendingNewExerciseId);
                        if (!existingSets || existingSets.length === 0) {
                            await safeDb(() => dbOps.exercises.delete(pendingNewExerciseId), 'cleanup ghost exercise');
                        }
                        setPendingNewExerciseId(null);
                    }
                    modalBack();
                    setSelectedWeight(null);
                    setPreviousWeight(null);
                    return;
                }

                const daySets = await dbOps.sets.getByDate(currentDate);
                let exerciseOrder = 1;
                const existingExercise = daySets.filter(s => s.exerciseId === selectedExercise.id);
                if (existingExercise.length === 0) {
                    exerciseOrder = Math.max(...daySets.map(s => s.exerciseOrder), 0) + 1;
                } else {
                    exerciseOrder = existingExercise[0].exerciseOrder;
                }

                // Use max existing setOrder + 1 to prevent duplicates from race conditions
                const maxSetOrder = existingExercise.reduce((max, s) => Math.max(max, s.setOrder || 0), 0);
                const setOrder = Math.max(existingExercise.length + 1, maxSetOrder + 1);

                const fullExercise = await dbOps.exercises.get(selectedExercise.id);
                const weightMeaning = fullExercise?.weightMeaning || 'total';

                const set = {
                    id: generateId('set'),
                    date: currentDate,
                    exerciseId: selectedExercise.id,
                    exerciseName: selectedExercise.name,
                    exerciseOrder,
                    setOrder,
                    weight: selectedWeight.weight,
                    weightType: selectedWeight.weightType,
                    reps,
                    duration: null,
                    weightMeaning,
                    createdAt: Date.now(),
                };

                // CHANGE 6: Record bandedColor if present
                if (selectedWeight.weightType === 'banded' && selectedWeight.bandedColor) {
                    set.bandedColor = selectedWeight.bandedColor;
                }

                const ok = await safeDb(() => dbOps.sets.add(set), 'log set');
                if (!ok) return;

                const exCopy = { ...selectedExercise, lastUsed: currentDate };
                await safeDb(() => dbOps.exercises.update(exCopy), 'update exercise');

                setPendingNewExerciseId(null);
                setLoggedSetCount(loggedSetCount + 1);
                setModal(null);
                setSelectedExercise(null);
                setSelectedWeight(null);
                setPreviousWeight(null);

                await loadDayData();

                if (pendingLockType) {
                    setExerciseLocks(prev => ({ ...prev, [selectedExercise.id]: pendingLockType }));
                    setPendingLockType(null);
                }
            };

            const handleDurationSelected = async (duration) => {
                if (duration === null) {
                    if (pendingNewExerciseId) {
                        const existingSets = await dbOps.sets.getByExerciseId(pendingNewExerciseId);
                        if (!existingSets || existingSets.length === 0) {
                            await safeDb(() => dbOps.exercises.delete(pendingNewExerciseId), 'cleanup ghost exercise');
                        }
                        setPendingNewExerciseId(null);
                    }
                    modalBack();
                    setSelectedWeight(null);
                    setPreviousWeight(null);
                    return;
                }

                const daySets = await dbOps.sets.getByDate(currentDate);
                let exerciseOrder = 1;
                const existingExercise = daySets.filter(s => s.exerciseId === selectedExercise.id);
                if (existingExercise.length === 0) {
                    exerciseOrder = Math.max(...daySets.map(s => s.exerciseOrder), 0) + 1;
                } else {
                    exerciseOrder = existingExercise[0].exerciseOrder;
                }

                const maxSetOrderDur = existingExercise.reduce((max, s) => Math.max(max, s.setOrder || 0), 0);
                const setOrder = Math.max(existingExercise.length + 1, maxSetOrderDur + 1);

                const fullExerciseDur = await dbOps.exercises.get(selectedExercise.id);
                const weightMeaningDur = fullExerciseDur?.weightMeaning || 'total';

                const set = {
                    id: generateId('set'),
                    date: currentDate,
                    exerciseId: selectedExercise.id,
                    exerciseName: selectedExercise.name,
                    exerciseOrder,
                    setOrder,
                    weight: selectedWeight.weight || null,
                    weightType: selectedWeight.weightType,
                    reps: null,
                    duration,
                    weightMeaning: weightMeaningDur,
                    createdAt: Date.now(),
                };

                // CHANGE 6: Record bandedColor if present
                if (selectedWeight.weightType === 'banded' && selectedWeight.bandedColor) {
                    set.bandedColor = selectedWeight.bandedColor;
                }

                const ok = await safeDb(() => dbOps.sets.add(set), 'log set');
                if (!ok) return;

                const exCopy = { ...selectedExercise, lastUsed: currentDate };
                await safeDb(() => dbOps.exercises.update(exCopy), 'update exercise');

                setPendingNewExerciseId(null);
                setLoggedSetCount(loggedSetCount + 1);
                setModal(null);
                setSelectedExercise(null);
                setSelectedWeight(null);
                setPreviousWeight(null);

                await loadDayData();

                if (pendingLockType) {
                    setExerciseLocks(prev => ({ ...prev, [selectedExercise.id]: pendingLockType }));
                    setPendingLockType(null);
                }
            };

            const handleDeleteSet = async (setId) => {
                const ok = await safeDb(() => dbOps.sets.delete(setId), 'delete set');
                if (ok) await loadDayData();
            };

            const handleEditSet = async (set) => {
                setSelectedSetForEdit(set);
                setSelectedExercise(await dbOps.exercises.get(set.exerciseId));
                setSelectedWeight({
                    weight: set.weight,
                    weightType: set.weightType,
                    bandedColor: set.bandedColor,
                });

                if (set.reps) {
                    setModal('repPicker');
                } else {
                    setModal('timedDuration');
                }
            };

            const handlePairWith = async (sourceExerciseId, targetExerciseId) => {
                const daySets = await dbOps.sets.getByDate(currentDate);
                const sourceSets = daySets.filter(s => s.exerciseId === sourceExerciseId);
                const targetSets = daySets.filter(s => s.exerciseId === targetExerciseId);
                if (sourceSets.length === 0) return;

                const sourceLastSet = sourceSets[sourceSets.length - 1];
                const targetEx = await dbOps.exercises.get(targetExerciseId);
                if (!targetEx) return;

                // Mark all source sets as paired
                for (const s of sourceSets) {
                    s.pairedWith = targetExerciseId;
                    await safeDb(() => dbOps.sets.update(s), 'pair source set');
                }

                // If target has no sets today, create a mirror set with same duration
                if (targetSets.length === 0) {
                    const maxOrder = Math.max(...daySets.map(s => s.exerciseOrder), 0);
                    const newSet = {
                        id: generateId('set'),
                        date: currentDate,
                        exerciseId: targetExerciseId,
                        exerciseName: targetEx.name,
                        exerciseOrder: maxOrder + 1,
                        setOrder: 1,
                        weight: sourceLastSet.weight,
                        weightType: sourceLastSet.weightType,
                        reps: null,
                        duration: sourceLastSet.duration,
                        weightMeaning: targetEx.weightMeaning || 'total',
                        pairedWith: sourceExerciseId,
                        createdAt: Date.now(),
                    };
                    await safeDb(() => dbOps.sets.add(newSet), 'create paired set');
                } else {
                    // Mark existing target sets as paired
                    for (const s of targetSets) {
                        s.pairedWith = sourceExerciseId;
                        await safeDb(() => dbOps.sets.update(s), 'pair target set');
                    }
                }

                setPairingExerciseId(null);
                await loadDayData();
            };

            const handleDeleteExercise = (exercise) => {
                setConfirmation({
                    title: `Delete ${exercise.exerciseName}?`,
                    message: `Remove ${exercise.exerciseName} and all its sets from today?`,

                    onConfirm: async () => {
                        const daySets = await dbOps.sets.getByDate(currentDate);
                        const toDelete = daySets.filter(s => s.exerciseId === exercise.exerciseId);
                        for (const set of toDelete) {
                            await dbOps.sets.delete(set.id);
                        }
                        setConfirmation(null);
                        await loadDayData();
                    },
                    onCancel: () => setConfirmation(null),
                });
            };

            const handleMenuClick = (exercise, action) => {
                if (action === 'delete') {
                    handleDeleteExercise(exercise);
                } else if (action === 'sessionNote') {
                    setSelectedExercise(exercise.sets[0] ? { id: exercise.exerciseId, name: exercise.exerciseName, type: 'reps' } : null);
                    dbOps.exercises.get(exercise.exerciseId).then(ex => {
                        setSelectedExercise(ex);
                        setModal('sessionNote');
                    });
                } else if (action === 'rename') {
                    setSelectedExercise(exercise.sets[0] ? { id: exercise.exerciseId, name: exercise.exerciseName, type: 'reps' } : null);
                    dbOps.exercises.get(exercise.exerciseId).then(ex => {
                        setSelectedExercise(ex);
                        setModal('rename');
                    });
                } else if (action === 'changeCategory') {
                    setSelectedExercise(exercise.sets[0] ? { id: exercise.exerciseId, name: exercise.exerciseName, type: 'reps' } : null);
                    dbOps.exercises.get(exercise.exerciseId).then(ex => {
                        setSelectedExercise(ex);
                        setModal('changeCategory');
                    });
                } else if (action === 'changeType') {
                    dbOps.exercises.get(exercise.exerciseId).then(ex => {
                        setSelectedExercise(ex);
                        setModal('changeType');
                    });
                } else if (action === 'changeWeightDefault') {
                    dbOps.exercises.get(exercise.exerciseId).then(ex => {
                        setSelectedExercise(ex);
                        setModal('changeWeightDefault');
                    });
                }
            };

            const groupedExercises = {};
            daySets.forEach(set => {
                if (!groupedExercises[set.exerciseId]) {
                    groupedExercises[set.exerciseId] = {
                        exerciseId: set.exerciseId,
                        exerciseName: set.exerciseName,
                        sets: [],
                        _categories: null,
                    };
                }
                groupedExercises[set.exerciseId].sets.push(set);
            });
            // Attach category data for split tags (from state cache)
            for (const exGroup of Object.values(groupedExercises)) {
                exGroup._categories = exerciseCatsCache[exGroup.exerciseId] || [];
            }

            // Merge paired exercises into combined cards
            const pairedMerged = new Set();
            for (const exGroup of Object.values(groupedExercises)) {
                const pairedId = exGroup.sets[0]?.pairedWith;
                if (pairedId && groupedExercises[pairedId] && !pairedMerged.has(exGroup.exerciseId)) {
                    const partner = groupedExercises[pairedId];
                    // Mark both as merged — keep the source, hide the partner
                    exGroup._pairedPartner = partner;
                    exGroup._pairedName = exGroup.exerciseName.length + partner.exerciseName.length > 28
                        ? `${exGroup.exerciseName}\n& ${partner.exerciseName}`
                        : `${exGroup.exerciseName} & ${partner.exerciseName}`;
                    pairedMerged.add(pairedId);
                    pairedMerged.add(exGroup.exerciseId);
                }
            }

            const exercises = Object.values(groupedExercises)
                .filter(ex => !pairedMerged.has(ex.exerciseId) || ex._pairedPartner)
                .sort((a, b) => {
                    const aOrder = a.sets[0]?.exerciseOrder || 0;
                    const bOrder = b.sets[0]?.exerciseOrder || 0;
                    // If day has a split assigned, push non-matching exercises to bottom
                    if (dayLabel) {
                        const aInSplit = (a._categories || []).some(c => c.toLowerCase() === dayLabel.toLowerCase());
                        const bInSplit = (b._categories || []).some(c => c.toLowerCase() === dayLabel.toLowerCase());
                        if (aInSplit && !bInSplit) return -1;
                        if (!aInSplit && bInSplit) return 1;
                    }
                    return aOrder - bOrder;
                });

            const RenameModal = ({ exercise, onSave, onCancel }) => {
                const [newName, setNewName] = useState(exercise.name);

                const handleSave = async () => {
                    if (!newName.trim()) return;

                    // CHANGE 5: Instead of window.confirm, set renameConfirmData to show custom modal
                    setRenameConfirmData({
                        exerciseId: exercise.id,
                        newName: newName.trim(),
                        exercise: exercise
                    });
                };

                return (
                    <div className="modal-overlay" onClick={onCancel}>
                        <div className="modal" onClick={(e) => e.stopPropagation()}>
                            <div className="modal-header" {...makeSwipeDownHandlers(onCancel)}>
                                <h2>Rename Activity</h2>
                                <button className="close-btn" onClick={onCancel}>x</button>
                            </div>
                            <div className="modal-content">
                                <div className="form-group">
                                    <label className="form-label">Activity Name</label>
                                    <input
                                        type="text"
                                        className="form-input"
                                        value={newName}
                                        onChange={(e) => setNewName(e.target.value)}
                                        autoFocus
                                    />
                                </div>
                            </div>
                            <div className="modal-footer">
                                <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
                                <button className="btn" onClick={handleSave}>Save</button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="app-container">
                    <div className="top-nav">
                        <div className="nav-title">Fitness Tracker</div>
                        <button className="settings-btn" onClick={() => { setExpandedExercise(null); setModal('settings'); }}>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8b3a62" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                            </svg>
                        </button>
                    </div>

                    <div className="day-nav">
                        <button className="nav-arrow" onClick={() => setCurrentDate(addDays(currentDate, -1))}>&lt;</button>
                        <div className="day-display"
                            onClick={() => setModal('dayDetail')}
                            style={{ cursor: 'pointer' }}
                        >
                            <div className="day-date">{formatDate(currentDate)}</div>
                            {dayLabel && <div className="day-label">{dayLabel}</div>}
                        </div>
                        <button className="nav-arrow" onClick={() => setCurrentDate(addDays(currentDate, 1))}>&gt;</button>
                    </div>

                    <div className="content" ref={contentRef} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                        <div className="content-padding">
                            {/* Bodyweight banner — tap to edit, swipe left to dismiss, hold to disable */}
                            {!weightBannerDismissed && !bannerSlidingOut && getPref('hideWeightBanner') !== 'true' && currentDate === getTodayString() && !showBWEditor && (
                                <div
                                    onTouchStart={(e) => {
                                        bannerSwipeRef.current = { startX: e.touches[0].clientX, startY: e.touches[0].clientY, swiping: false, el: e.currentTarget };
                                        bannerLongPressRef.current = setTimeout(() => {
                                            bannerLongPressRef.current = 'fired';
                                            setShowDisableBannerConfirm(true);
                                        }, 600);
                                    }}
                                    onTouchMove={(e) => {
                                        const dx = e.touches[0].clientX - bannerSwipeRef.current.startX;
                                        const dy = e.touches[0].clientY - bannerSwipeRef.current.startY;
                                        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                                            if (bannerLongPressRef.current && bannerLongPressRef.current !== 'fired') clearTimeout(bannerLongPressRef.current);
                                        }
                                        if (dx < -10) {
                                            bannerSwipeRef.current.swiping = true;
                                            if (bannerSwipeRef.current.el) bannerSwipeRef.current.el.style.transform = `translateX(${Math.min(0, dx)}px)`;
                                            if (bannerSwipeRef.current.el) bannerSwipeRef.current.el.style.opacity = Math.max(0, 1 + dx / 150);
                                        }
                                    }}
                                    onTouchEnd={(e) => {
                                        if (bannerLongPressRef.current && bannerLongPressRef.current !== 'fired') clearTimeout(bannerLongPressRef.current);
                                        const dx = e.changedTouches[0].clientX - bannerSwipeRef.current.startX;
                                        if (dx < -80) {
                                            setBannerSlidingOut(true);
                                            setTimeout(() => setWeightBannerDismissed(true), 300);
                                        } else {
                                            if (bannerSwipeRef.current.el) { bannerSwipeRef.current.el.style.transform = ''; bannerSwipeRef.current.el.style.opacity = ''; }
                                            if (!bannerSwipeRef.current.swiping && bannerLongPressRef.current !== 'fired') {
                                                setShowBWEditor(true);
                                                setBWEditValue(bodyweight ? bodyweight.toString() : '');
                                            }
                                        }
                                    }}
                                    style={{
                                        padding: '12px 16px',
                                        marginBottom: '12px',
                                        background: 'rgba(139,58,98,0.1)',
                                        border: '1px solid rgba(139,58,98,0.2)',
                                        borderRadius: '12px',
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '10px',
                                        cursor: 'pointer',
                                        animation: 'bannerFadeIn 0.4s ease-out',
                                        transition: 'transform 0.2s, opacity 0.2s',

                                >
                                    <div style={{
                                        width: '8px', height: '8px', borderRadius: '50%',
                                        background: '#c77da0',
                                        animation: 'dotBeacon 2s ease-in-out infinite',
                                        flexShrink: 0,

                                    <div style={{ flex: 1 }}>
                                        <div style={{ fontSize: '13px', color: '#e8d0d0', fontWeight: '500' }}>
                                            Log today's weight{bodyweight ? ` \u2014 last: ${bodyweight} ${unit}` : ''}
                                        </div>
                                    </div>
                                    <div style={{ fontSize: '11px', color: 'rgba(199,125,160,0.4)' }}>&lt;</div>
                                </div>
                            )}

                            {/* Bodyweight inline editor — slim banner style */}
                            {showBWEditor && (
                                <div style={{
                                    padding: '8px 12px',
                                    marginBottom: '12px',
                                    background: 'rgba(139,58,98,0.1)',
                                    border: '1px solid rgba(139,58,98,0.25)',
                                    borderRadius: '12px',
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '8px',
                                    animation: 'bannerFadeIn 0.3s ease-out',
                                }}>
                                    <div style={{ fontSize: '11px', color: 'rgba(199,125,160,0.6)', fontWeight: '500', flexShrink: 0 }}>
                                        BW ({unit})
                                    </div>
                                    <input
                                        type="number"
                                        value={bwEditValue}
                                        onChange={(e) => setBWEditValue(e.target.value)}
                                        autoFocus
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter' && bwEditValue.trim()) {
                                                const val = parseFloat(bwEditValue);
                                                setBodyweight(val);
                                                safeDb(() => dbOps.dayNotes.set('__bodyweight__', bwEditValue.trim()), 'save bodyweight');
                                                setShowBWEditor(false);
                                            }
                                        }}

                            exercise={selectedExercise}
                            weight={selectedWeight.weight}
                            weightType={selectedWeight.weightType}
                            bandedColor={selectedWeight.bandedColor}
                            onSelectReps={handleRepsSelected}
                            setNumber={setNumber}
                        />
                    )}

                    {modal === 'timedDuration' && selectedExercise && selectedWeight && (
                        <TimedDurationModal
                            exercise={selectedExercise}
                            weight={selectedWeight.weight}
                            weightType={selectedWeight.weightType}
                            bandedColor={selectedWeight.bandedColor}
                            onSelectDuration={handleDurationSelected}
                            setNumber={setNumber}
                        />
                    )}

                    {modal === 'settings' && (
                        <SettingsModal onClose={() => { setModal(null); loadDayData(); }} categories={categories} onCategoriesChanged={(cats) => setCategories(cats)} unit={unit} setUnit={setUnit} />
                    )}

                    {modal === 'sessionNote' && selectedExercise && (
                        <SessionNoteModal
                            exercise={selectedExercise}
                            date={currentDate}
                            onSave={() => {
                                setModal(null);
                                setSelectedExercise(null);
                                loadDayData();
                            }}
                            onCancel={() => {
                                setModal(null);
                                setSelectedExercise(null);
                            }}
                        />
                    )}

                    {modal === 'changeCategory' && selectedExercise && (
                        <ChangeCategoryModal
                            exercise={selectedExercise}
                            categories={categories}
                            dayLabel={dayLabel}
                            onSave={() => {
                                setModal(null);
                                setSelectedExercise(null);
                                loadDayData();
                            }}
                            onCancel={() => {
                                setModal(null);
                                setSelectedExercise(null);
                            }}
                        />
                    )}

                    {modal === 'changeType' && selectedExercise && (() => {
                        const currentType = selectedExercise.type || 'reps';
                        const newType = currentType === 'reps' ? 'timed' : 'reps';
                        const handleConfirmTypeChange = async () => {
                            const updated = { ...selectedExercise, type: newType };
                            const ok = await safeDb(() => dbOps.exercises.update(updated), 'change type');
                            if (ok) {
                                setModal(null);
                                setSelectedExercise(null);
                                loadDayData();
                            }
                        };
                        return (
                            <div className="modal-overlay" onClick={() => { setModal(null); setSelectedExercise(null); }}>
                                <div style={{ background: '#1a0a12', borderRadius: '16px', padding: '24px', maxWidth: '340px', width: '100%', margin: '0 20px', border: '1px solid rgba(139,58,98,0.3)' }} onClick={(e) => e.stopPropagation()}>
                                    <div style={{ fontSize: '15px', fontWeight: '600', color: '#e8c1d0', marginBottom: '12px', textAlign: 'center' }}>Change Type</div>
                                    <div style={{ fontSize: '13px', color: '#c77da0', lineHeight: '1.5', marginBottom: '8px', textAlign: 'center' }}>
                                        Switch <strong style={{ color: '#e8c1d0' }}>{selectedExercise.name}</strong> from <strong style={{ color: '#e8c1d0' }}>{currentType}</strong> to <strong style={{ color: '#e8c1d0' }}>{newType}</strong>?
                                    </div>
                                    <div style={{ fontSize: '11px', color: 'rgba(199,125,160,0.5)', lineHeight: '1.4', marginBottom: '20px', textAlign: 'center' }}>
                                        Your existing logged sets will keep their original data. New sets will use the {newType === 'timed' ? 'duration timer' : 'rep counter'}.
                                    </div>
                                    <div style={{ display: 'flex', gap: '12px' }}>
                                        <button onClick={() => { setModal(null); setSelectedExercise(null); }} style={{ flex: 1, padding: '12px', borderRadius: '8px', border: '1px solid rgba(139,58,98,0.3)', background: 'rgba(139,58,98,0.1)', color: '#c77da0', fontSize: '14px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none' }}>Cancel</button>
                                        <button onClick={handleConfirmTypeChange} style={{ flex: 1, padding: '12px', borderRadius: '8px', border: 'none', background: '#8b3a62', color: '#fff', fontSize: '14px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none' }}>Switch to {newType}</button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {modal === 'changeWeightDefault' && selectedExercise && (() => {
                        const currentWD = selectedExercise.weightDefault || 'weight';
                        const options = [
                            { id: 'weight', label: 'Weight', desc: 'Weight picker shown each set' },
                            { id: 'bodyweight', label: 'Bodyweight', desc: 'Auto-logs as bodyweight, skips weight picker' },
                            { id: 'none', label: 'No Weight', desc: 'Skips weight picker entirely' },
                        ];
                        const handleSelect = async (newWD) => {
                            if (newWD === currentWD) { setModal(null); setSelectedExercise(null); return; }
                            const updated = { ...selectedExercise, weightDefault: newWD };
                            const ok = await safeDb(() => dbOps.exercises.update(updated), 'change weight default');
                            if (ok) {
                                setModal(null);
                                setSelectedExercise(null);
                                loadDayData();
                            }
                        };
                        return (
                            <div className="modal-overlay" onClick={() => { setModal(null); setSelectedExercise(null); }}>
                                <div style={{ background: '#1a0a12', borderRadius: '16px', padding: '24px', maxWidth: '340px', width: '100%', margin: '0 20px', border: '1px solid rgba(139,58,98,0.3)' }} onClick={(e) => e.stopPropagation()}>
                                    <div style={{ fontSize: '15px', fontWeight: '600', color: '#e8c1d0', marginBottom: '4px', textAlign: 'center' }}>Weight Prompt</div>
                                    <div style={{ fontSize: '11px', color: 'rgba(199,125,160,0.5)', marginBottom: '16px', textAlign: 'center' }}>{selectedExercise.name}</div>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '16px' }}>
                                        {options.map(opt => (
                                            <button key={opt.id} onClick={() => handleSelect(opt.id)} style={{
                                                width: '100%', padding: '14px', borderRadius: '10px', textAlign: 'left', cursor: 'pointer', WebkitAppearance: 'none',
                                                border: currentWD === opt.id ? '1.5px solid #8b3a62' : '1px solid rgba(139,58,98,0.2)',
                                                background: currentWD === opt.id ? 'rgba(139,58,98,0.12)' : 'rgba(139,58,98,0.04)',
                                            }}>
                                                <div style={{ color: '#e8c1d0', fontSize: '14px', fontWeight: '500' }}>{opt.label}</div>
                                                <div style={{ color: 'rgba(199,125,160,0.5)', fontSize: '11px', marginTop: '2px' }}>{opt.desc}</div>
                                            </button>
                                        ))}
                                    </div>
                                    <button onClick={() => { setModal(null); setSelectedExercise(null); }} style={{
                                        width: '100%', padding: '10px', borderRadius: '8px', border: '1px solid rgba(139,58,98,0.3)',
                                        background: 'rgba(139,58,98,0.1)', color: '#c77da0', fontSize: '13px', fontWeight: '600',
                                        cursor: 'pointer', WebkitAppearance: 'none',
                                    }}>Cancel</button>
                                </div>
                            </div>
                        );
                    })()}

                    {modal === 'rename' && selectedExercise && (
                        <RenameModal
                            exercise={selectedExercise}
                            onSave={() => {
                                setModal(null);
                                setSelectedExercise(null);
                                loadDayData();
                            }}
                            onCancel={() => {
                                setModal(null);
                                setSelectedExercise(null);
                            }}
                        />
                    )}

                    {/* CHANGE 5: Custom themed rename confirmation modal */}
                    {renameConfirmData && (
                        <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.5)', zIndex: 300, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' }}
                             onClick={() => setRenameConfirmData(null)}>
                            <div style={{ background: '#1a0a12', borderRadius: '16px', padding: '20px', maxWidth: '340px', width: '100%' }}
                                 onClick={(e) => e.stopPropagation()}>
                                <div style={{ fontSize: '14px', color: '#e8c1d0', textAlign: 'center', marginBottom: '20px', lineHeight: '1.5' }}>
                                    This will rename the activity for all days, not just today.
                                </div>
                                <div style={{ display: 'flex', gap: '12px' }}>
                                    <button
                                        onClick={() => setRenameConfirmData(null)}
                                        style={{
                                            flex: '1',
                                            padding: '12px 16px',
                                            backgroundColor: 'rgba(139,58,98,0.1)',
                                            border: '1px solid rgba(139,58,98,0.3)',
                                            color: '#c77da0',
                                            borderRadius: '8px',
                                            cursor: 'pointer',
                                            fontSize: '14px',
                                            fontWeight: '600'
                                        }}
                                    >
                                        Cancel
                                    </button>
                                    <button
                                        onClick={async () => {
                                            const newName = renameConfirmData.newName;
                                            const exCopy = { ...renameConfirmData.exercise, name: newName };
                                            const ok = await safeDb(() => dbOps.exercises.update(exCopy), 'rename exercise');
                                            if (!ok) return;

                                            const allSets = await dbOps.sets.getByExerciseId(renameConfirmData.exerciseId);
                                            for (const set of allSets) {
                                                const setCopy = { ...set, exerciseName: newName };
                                                const setOk = await safeDb(() => dbOps.sets.update(setCopy), 'rename set');
                                                if (!setOk) break;
                                            }

                                            setRenameConfirmData(null);
                                            setModal(null);
                                            setSelectedExercise(null);
                                            await loadDayData();
                                        }}
                                        style={{
                                            flex: '1',
                                            padding: '12px 16px',
                                            backgroundColor: '#8b3a62',
                                            color: 'white',
                                            border: 'none',
                                            borderRadius: '8px',
                                            cursor: 'pointer',
                                            fontSize: '14px',
                                            fontWeight: '600'
                                        }}
                                    >
                                        Confirm
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}


                    {modal === 'dayDetail' && (
                        <DayDetailModal
                            date={currentDate}
                            dayLabel={dayLabel}
                            categories={categories}
                            onClose={() => setModal(null)}
                            onSplitChange={async (newSplit) => {
                                await setDaySplit(currentDate, newSplit);
                                await loadDayData();
                            }}
                            unit={unit}
                        />
                    )}


                    {confirmation && (
                        <ConfirmationDialog
                            title={confirmation.title}
                            message={confirmation.message}
                            onConfirm={confirmation.onConfirm}
                            onCancel={confirmation.onCancel}
                        />
                    )}
                </div>
            );
        }

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { error: null }; }
            static getDerivedStateFromError(error) { return { error }; }
            render() {
                if (this.state.error) {
                    return React.createElement('div', { style: { color: 'red', padding: '20px', fontSize: '14px' } },
                        React.createElement('h2', null, 'App Error'),
                        React.createElement('pre', { style: { whiteSpace: 'pre-wrap' } }, this.state.error.toString()),
                        React.createElement('pre', { style: { whiteSpace: 'pre-wrap', fontSize: '11px', marginTop: '10px' } }, this.state.error.stack)
                    );
                }
                return this.props.children;
            }
        }
        // Initialize preferences from IndexedDB before rendering
        initPrefs().then(() => {
            ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById('root'));
        }).catch(() => {
            // Render anyway even if prefs fail to load
            ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById('root'));
        });
    </script>
</body>
</html>
