                                                style={{ background: 'none', border: 'none', color: 'rgba(255, 100, 100, 0.4)', fontSize: '18px', cursor: 'pointer', padding: '4px 8px' }}
                                            >x</button>
                                        </>
                                    )}
                                </div>
                            ))}
                        </div>
                        <div className="modal-footer">
                            <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
                            <button className="btn" onClick={() => onSave(cats)}>Save</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ExercisePickerModal = ({ onSelect, onCreateNew, selectedDate, categories, onCategoriesChanged, defaultCategory, onPair }) => {
            const [search, setSearch] = useState('');
            const [category, setCategory] = useState(defaultCategory || 'all');
            const [exercises, setExercises] = useState([]);
            const [filtered, setFiltered] = useState([]);
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [pairingSource, setPairingSource] = useState(null);

            useEffect(() => {
                const loadExercises = async () => {
                    const all = await dbOps.exercises.getByLastUsed();
                    setExercises(all || []);
                };
                loadExercises();
            }, []);

            useEffect(() => {
                let result = exercises;

                if (category !== 'all') {
                    result = result.filter(e => getExCategories(e).some(c => c.toLowerCase() === category.toLowerCase()));
                }

                if (search.trim()) {
                    const q = search.toLowerCase();
                    result = result.filter(e => e.name.toLowerCase().includes(q));
                }

                setFiltered(result);
            }, [exercises, search, category]);

            const [sortedCategories, setSortedCategories] = useState(categories);
            const [showEditCategories, setShowEditCategories] = useState(false);

            // Sort categories by usage frequency (most days assigned → leftmost)
            useEffect(() => {
                (async () => {
                    try {
                        const allNotes = await dbOps.dayNotes.getAll();
                        const splitCounts = {};
                        categories.forEach(c => { splitCounts[c] = 0; });
                        allNotes.forEach(n => {
                            if (n.date && n.date.startsWith('__split_') && n.note) {
                                const splitName = n.note.toLowerCase();
                                categories.forEach(c => {
                                    if (c.toLowerCase() === splitName) splitCounts[c]++;
                                });
                            }
                        });
                        const sorted = [...categories].sort((a, b) => (splitCounts[b] || 0) - (splitCounts[a] || 0));
                        setSortedCategories(sorted);
                    } catch(e) { setSortedCategories(categories); }
                })();
            }, [categories]);

            const allCategories = ['all', ...sortedCategories];

            if (showEditCategories) {
                return (
                    <EditCategoriesModal
                        categories={categories}
                        onSave={async (newCats) => {
                            await saveCategories(newCats);
                            if (onCategoriesChanged) onCategoriesChanged(newCats);
                            setShowEditCategories(false);
                        }}
                        onCancel={() => setShowEditCategories(false)}
                    />
                );
            }

            return (
                <div className="modal-overlay" onClick={() => onSelect(null)}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header" {...makeSwipeDownHandlers(() => onSelect(null))}>
                            <h2>Add Activity</h2>
                            <button className="close-btn" onClick={() => onSelect(null)}>x</button>
                        </div>
                        <div className="modal-content">
                            <button className="btn btn-secondary" onClick={onCreateNew} style={{ marginBottom: 16 }}>
                                + Create New Activity
                            </button>

                            <input
                                type="text"
                                className="search-input"
                                placeholder="Search activities..."
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                            />

                            <div>
                                <div className="category-tabs">
                                    {allCategories.map(cat => (
                                        <button
                                            key={cat}
                                            className={`category-tab ${category === cat ? 'active' : ''}`}
                                            onClick={() => setCategory(cat)}
                                        >
                                            {cat === 'all' ? 'All' : cat}
                                        </button>
                                    ))}
                                    <button
                                        className="category-tab"
                                        style={{ backgroundColor: 'rgba(180, 80, 50, 0.3)', borderColor: 'rgba(180, 80, 50, 0.5)', color: '#d4845a' }}
                                        onClick={() => setShowEditCategories(true)}
                                    >
                                        Edit
                                    </button>
                                </div>
                            </div>

                            {deleteConfirm && (
                                <div style={{ padding: '12px', marginBottom: '12px', borderRadius: '10px', border: '1px solid rgba(220,60,60,0.3)', background: 'rgba(220,60,60,0.08)' }}>
                                    <div style={{ fontSize: '13px', color: '#e8a0a0', marginBottom: '8px' }}>Delete "{deleteConfirm.name}" permanently? This removes the activity and all its history.</div>
                                    <div style={{ display: 'flex', gap: '8px' }}>
                                        <button onClick={async () => {
                                            await safeDb(() => dbOps.exercises.delete(deleteConfirm.id), 'delete exercise');
                                            // Also delete all sets for this exercise
                                            const allSets = await dbOps.sets.getByExerciseId(deleteConfirm.id);
                                            for (const s of allSets) { await safeDb(() => dbOps.sets.delete(s.id), 'delete set'); }
                                            setExercises(prev => prev.filter(e => e.id !== deleteConfirm.id));
                                            setDeleteConfirm(null);
                                        }} style={{ flex: 1, padding: '10px', borderRadius: '8px', border: 'none', background: 'rgba(220,60,60,0.3)', color: '#ff8888', fontSize: '13px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none' }}>Delete</button>
                                        <button onClick={() => setDeleteConfirm(null)} style={{ flex: 1, padding: '10px', borderRadius: '8px', border: '1px solid rgba(139,58,98,0.2)', background: 'rgba(139,58,98,0.05)', color: '#c77da0', fontSize: '13px', cursor: 'pointer', WebkitAppearance: 'none' }}>Cancel</button>
                                    </div>
                                </div>
                            )}

                            {pairingSource && (
                                <div style={{ padding: '10px 12px', marginBottom: '10px', borderRadius: '10px', background: 'rgba(139,58,98,0.12)', border: '1px solid rgba(139,58,98,0.3)' }}>
                                    <div style={{ fontSize: '12px', color: '#e8c1d0', fontWeight: '600', marginBottom: '4px' }}>Pairing: {pairingSource.name}</div>
                                    <div style={{ fontSize: '10px', color: 'rgba(199,125,160,0.5)' }}>Tap another timed activity to pair with</div>
                                    <button onClick={() => setPairingSource(null)} style={{ marginTop: '6px', padding: '4px 12px', borderRadius: '6px', border: '1px solid rgba(139,58,98,0.2)', background: 'none', color: 'rgba(199,125,160,0.5)', fontSize: '11px', cursor: 'pointer', WebkitAppearance: 'none' }}>Cancel Pairing</button>
                                </div>
                            )}

                            {filtered.length > 0 ? (
                                <div className="exercise-picker-section">
                                    <div className="section-title">{category === 'all' ? 'All Activities' : category}</div>
                                    <div style={{ fontSize: '10px', color: 'rgba(199,125,160,0.3)', marginBottom: '8px' }}>Long press to delete</div>
                                    {filtered.map(ex => (
                                        <div
                                            key={ex.id}
                                            className="exercise-picker-item"
                                            style={{ display: 'flex', alignItems: 'center', gap: '8px' }}
                                            onClick={() => {
                                                if (pairingSource) {
                                                    if (ex.id === pairingSource.id) return;
                                                    if (ex.type !== 'timed') return;
                                                    if (onPair) onPair(pairingSource.id, ex.id);
                                                    setPairingSource(null);
                                                } else {
                                                    onSelect(ex);
                                                }
                                            }}
                                            onTouchStart={(e) => {
                                                if (pairingSource) return;
                                                const el = e.currentTarget;
                                                el._lpTimer = setTimeout(() => { el._lpFired = true; setDeleteConfirm(ex); }, 600);
                                                el._lpFired = false;
                                            }}
                                            onTouchMove={(e) => { const el = e.currentTarget; if (el._lpTimer) { clearTimeout(el._lpTimer); el._lpTimer = null; } }}
                                            onTouchEnd={(e) => { const el = e.currentTarget; if (el._lpTimer) { clearTimeout(el._lpTimer); el._lpTimer = null; } if (el._lpFired) { e.preventDefault(); } }}
                                        >
                                            <div style={{ flex: 1 }}>
                                                <div className="exercise-picker-name">{ex.name}</div>
                                                <div className="exercise-picker-meta">
                                                    {getExCategories(ex).length > 0 && <span>{formatCategories(ex)}</span>}
                                                    {ex.lastUsed ? ` · Last: ${formatDateShort(ex.lastUsed)}` : ''}
                                                </div>
                                            </div>
                                            {!pairingSource && ex.type === 'timed' && onPair && (
                                                <button
                                                    onClick={(e) => { e.stopPropagation(); setPairingSource(ex); }}
                                                    style={{
                                                        padding: '4px 10px', borderRadius: '6px', flexShrink: 0,
                                                        border: '1px solid rgba(139,58,98,0.3)', background: 'rgba(139,58,98,0.08)',
                                                        color: 'rgba(199,125,160,0.6)', fontSize: '10px', fontWeight: '600',
                                                        cursor: 'pointer', WebkitAppearance: 'none',
                                                    }}
                                                >pair</button>
                                            )}
                                            {pairingSource && ex.id !== pairingSource.id && ex.type === 'timed' && (
                                                <span style={{ fontSize: '10px', color: '#8b3a62', fontWeight: '600', flexShrink: 0 }}>tap to pair</span>
                                            )}
                                            {pairingSource && ex.id === pairingSource.id && (
                                                <span style={{ fontSize: '10px', color: 'rgba(199,125,160,0.3)', flexShrink: 0 }}>source</span>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div style={{ textAlign: 'center', color: '#666', marginTop: 20, marginBottom: 20 }}>
                                    {search ? 'No activities found' : 'No activities yet. Create one above!'}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const CreateExerciseModal = ({ onSave, onCancel, categories, dayLabel }) => {
            const [name, setName] = useState('');
            const [selectedCats, setSelectedCats] = useState(dayLabel && categories.includes(dayLabel.toLowerCase()) ? [dayLabel.toLowerCase()] : []);
            const [type, setType] = useState('reps');
            const [weightMeaning, setWeightMeaning] = useState('total');
            const [barType, setBarType] = useState(null);
            const [customBarWeight, setCustomBarWeight] = useState('');
            const [weightDefault, setWeightDefault] = useState('weight');
            const [showSplitWarning, setShowSplitWarning] = useState(false);
            const [recommendation, setRecommendation] = useState(null);
            const [dupMatches, setDupMatches] = useState([]);
            const [showDupPanel, setShowDupPanel] = useState(false);
            const [allExercises, setAllExercisesLocal] = useState([]);
            const dupCheckRef = useRef(null);

            // Load all exercises on mount for duplicate checking
            useEffect(() => {
                (async () => {
                    const all = await dbOps.exercises.getAll();
                    setAllExercisesLocal(all);
                })();
            }, []);

            // Fuzzy duplicate detection
            const checkDuplicates = (input) => {
                if (getPref('skipDupWarning') === 'true') return;
                if (!input || input.length < 3) { setDupMatches([]); setShowDupPanel(false); return; }

                const normalize = (s) => s.toLowerCase().replace(/[^a-z\s]/g, '').replace(/\s+/g, ' ').trim();
                const inputNorm = normalize(input);
                const inputWords = inputNorm.split(' ').filter(w => w.length > 1);

                const matches = [];
                allExercises.forEach(ex => {
                    const exNorm = normalize(ex.name);
                    const exWords = exNorm.split(' ').filter(w => w.length > 1);
                    let score = 0;

                    // Exact match
                    if (inputNorm === exNorm) { score = 100; }
                    // One contains the other
                    else if (inputNorm.includes(exNorm) || exNorm.includes(inputNorm)) { score = 70; }
                    else {
                        // Word overlap
                        inputWords.forEach(iw => {
                            exWords.forEach(ew => {
                                if (iw === ew) score += 15;
                                else if (iw.includes(ew) || ew.includes(iw)) score += 8;
                                else if (iw.replace(/s$/, '') === ew.replace(/s$/, '')) score += 12;
                            });
                        });
                        // Concatenated check
                        const ic = inputWords.join('');
                        const ec = exWords.join('');
                        if (ic.includes(ec) || ec.includes(ic)) score += 25;
                        if (ic.replace(/s$/, '') === ec.replace(/s$/, '')) score += 20;
                    }

                    if (score >= 15) matches.push({ exercise: ex, score });
                });

                matches.sort((a, b) => b.score - a.score);
                const top = matches.slice(0, 3);
                setDupMatches(top);
                if (top.length > 0) setShowDupPanel(true);
            };

            const handleNameChange = (val) => {
                setName(val);
                if (dupCheckRef.current) clearTimeout(dupCheckRef.current);
                dupCheckRef.current = setTimeout(() => checkDuplicates(val.trim()), 400);
            };

            const handleRecommend = () => {
                const raw = name.trim().toLowerCase();
                if (!raw) return;

                // Normalize: strip numbers, special chars, extra spaces
                const normalize = (s) => s.toLowerCase().replace(/[0-9°'"]+/g, '').replace(/[^a-z\s]/g, '').replace(/\s+/g, ' ').trim();
                const searchNorm = normalize(raw);
                const searchWords = searchNorm.split(' ').filter(w => w.length > 1);

                let bestMatch = null;
                let bestScore = 0;

                Object.keys(exerciseSplitRecommendations).forEach(key => {
                    const keyNorm = normalize(key);
                    const keyWords = keyNorm.split(' ').filter(w => w.length > 1);

                    // Exact normalized match
                    if (searchNorm === keyNorm) {
                        bestMatch = key;
                        bestScore = 100;
                        return;
                    }

                    // Check if search contains key or key contains search
                    if (searchNorm.includes(keyNorm) || keyNorm.includes(searchNorm)) {
                        if (keyNorm.length > bestScore) {
                            bestMatch = key;
                            bestScore = keyNorm.length + 50;
                        }
                        return;
                    }

                    // Word overlap scoring
                    let wordScore = 0;
                    searchWords.forEach(sw => {
                        keyWords.forEach(kw => {
                            if (sw === kw) wordScore += 10;
                            else if (sw.includes(kw) || kw.includes(sw)) wordScore += 5;
                            // Handle plural/singular: "chinups" vs "chin ups", "chinup" vs "chin up"
                            else if (sw.replace(/s$/, '') === kw.replace(/s$/, '')) wordScore += 8;
                        });
                    });

                    // Also check concatenated words: "chinups" should match "chin ups"
                    const searchConcat = searchWords.join('');
                    const keyConcat = keyWords.join('');
                    if (searchConcat.includes(keyConcat) || keyConcat.includes(searchConcat)) {
                        wordScore += 30;
                    }
                    // Check without 's': "chinups" -> "chinup" vs "chinup"
                    if (searchConcat.replace(/s$/, '').includes(keyConcat.replace(/s$/, '')) ||
                        keyConcat.replace(/s$/, '').includes(searchConcat.replace(/s$/, ''))) {
                        wordScore += 25;
                    }

                    if (wordScore > bestScore) {
                        bestMatch = key;
                        bestScore = wordScore;
                    }
                });

                if (bestMatch && bestScore >= 5) {
                    const matches = exerciseSplitRecommendations[bestMatch];
                    const validMatches = matches.filter(m => categories.includes(m));
                    if (validMatches.length > 0) {
                        setSelectedCats(validMatches);
                        setRecommendation(validMatches.join(', '));
                    } else {
                        setRecommendation('no-match');
                    }
                } else {
                    setRecommendation('unknown');
                }

                setTimeout(() => setRecommendation(null), 3000);
            };

            const doSave = async (opts = {}) => {
                const finalWeightMeaning = weightMeaning === 'bar' ? (barType === 'custom' ? 'bar-custom' : 'barbell') : weightMeaning;
                const exercise = {
                    id: generateId('ex'),
                    name: name.trim(),
                    category: selectedCats.length > 0 ? selectedCats[0] : '',
                    categories: selectedCats,
                    type,
                    weightMeaning: finalWeightMeaning,
                    weightDefault,
                    customBarWeight: weightMeaning === 'bar' && barType === 'custom' ? parseFloat(customBarWeight) || 0 : null,
                    variationOf: opts.variationOf || null,
                    note: '',
                    lastUsed: getTodayString(),
                    createdAt: Date.now(),
                };

                await dbOps.exercises.add(exercise);
                onSave(exercise);
            };

            const handleSave = async () => {
                if (!name.trim()) return;
                if (weightMeaning === 'bar' && !barType) return;
                if (weightMeaning === 'bar' && barType === 'custom' && !customBarWeight.trim()) return;

                // Check if user needs split warning
                if (selectedCats.length === 0) {
                    const pref = getPref('skipSplitWarning');
                    if (pref === 'true') {
                        await doSave();
                        return;
                    }
                    setShowSplitWarning(true);
                    return;
                }
                await doSave();
            };

            return (
                <>
                <div className="modal-overlay" onClick={onCancel}>
                    <div className="modal" style={{ height: '100vh', maxHeight: '100vh', top: 0, bottom: 0 }} onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header" {...makeSwipeDownHandlers(onCancel)}>
                            <h2>New Activity</h2>
                            <button className="close-btn" onClick={onCancel}>x</button>
                        </div>
                        <div className="modal-content" style={{ flex: 1, overflow: 'auto' }}>
                            <div className="form-group">
                                <label className="form-label">Activity Name</label>
                                <input
                                    type="text"
                                    className="form-input"
                                    placeholder="E.g., Bench Press"
                                    value={name}
                                    onChange={(e) => handleNameChange(e.target.value)}
                                    autoFocus
                                />
                                {/* Similar activity detection panel */}
                                {showDupPanel && dupMatches.length > 0 && (
                                    <div style={{
                                        marginTop: '8px', padding: '10px 12px',
                                        background: 'rgba(139,58,98,0.08)', border: '1px solid rgba(139,58,98,0.25)',
                                        borderRadius: '10px',
                                    }}>
                                        <div style={{ fontSize: '11px', color: '#e8c1d0', fontWeight: '600', marginBottom: '4px' }}>
                                            Similar activities already exist:
                                        </div>
                                        <div style={{ fontSize: '10px', color: 'rgba(199,125,160,0.4)', marginBottom: '8px' }}>
                                            "Use" logs to the existing activity. "New Variation" creates a separate version (e.g. incline vs flat).
                                        </div>
                                        {dupMatches.map((m, i) => (
                                            <div key={m.exercise.id} style={{
                                                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                                                padding: '8px 0',
                                                borderTop: i > 0 ? '1px solid rgba(139,58,98,0.1)' : 'none',
                                            }}>
                                                <div>
                                                    <div style={{ fontSize: '13px', color: '#e8d0d0' }}>{m.exercise.name}</div>
                                                    <div style={{ fontSize: '10px', color: 'rgba(199,125,160,0.5)' }}>
                                                        {formatCategories(m.exercise) || 'No split'}
                                                    </div>
                                                </div>
                                                <div style={{ display: 'flex', gap: '6px' }}>
                                                    <button
                                                        onClick={() => { onSave(m.exercise); }}
                                                        style={{
                                                            padding: '5px 10px', borderRadius: '6px', border: 'none',
                                                            background: '#8b3a62', color: '#fff', fontSize: '10px',
                                                            fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none',
                                                        }}
                                                    >Use This</button>
                                                    <button
                                                        onClick={() => { doSave({ variationOf: m.exercise.id }); }}
                                                        style={{
                                                            padding: '5px 10px', borderRadius: '6px',
                                                            border: '1px solid rgba(139,58,98,0.3)', background: 'rgba(139,58,98,0.06)',
                                                            color: '#c77da0', fontSize: '10px',
                                                            fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none',
                                                        }}
                                                    >New Variation</button>
                                                </div>
                                            </div>
                                        ))}
                                        <button
                                            onClick={() => setShowDupPanel(false)}
                                            style={{
                                                width: '100%', marginTop: '6px', padding: '6px',
                                                borderRadius: '6px', border: '1px solid rgba(139,58,98,0.15)',
                                                background: 'none', color: 'rgba(199,125,160,0.4)',
                                                fontSize: '11px', cursor: 'pointer', WebkitAppearance: 'none',
                                            }}
                                        >Neither — Create Brand New</button>
                                    </div>
                                )}
                                <div style={{ display: 'flex', gap: '8px', marginTop: '8px' }}>
                                    <button
                                        onClick={handleRecommend}
                                        className="btn btn-secondary"
                                        style={{ flex: 1, fontSize: '11px' }}
                                    >
                                        Recommend Split
                                    </button>
                                </div>
                                {recommendation && (
                                    <div style={{ fontSize: '11px', marginTop: '6px', textAlign: 'center', color: recommendation === 'no-match' ? '#999' : recommendation === 'unknown' ? '#999' : '#90ee90' }}>
                                        {recommendation === 'no-match'
                                            ? 'Recommended splits not in your categories'
                                            : recommendation === 'unknown'
                                            ? 'Exercise not in database'
                                            : `* Recommended: ${recommendation.charAt(0).toUpperCase() + recommendation.slice(1)}`}
                                    </div>
                                )}
                            </div>

                            <div className="form-group">
                                <label className="form-label">Splits (select multiple)</label>
                                <button
                                    onClick={() => setSelectedCats([])}
                                    className={`btn ${selectedCats.length === 0 ? '' : 'btn-secondary'}`}
                                    style={{ width: '100%', marginBottom: '8px' }}
                                >
                                    Do Not Assign to a Split
                                </button>
                                <div className="button-grid">
                                    {categories.map(cat => (
                                        <button
                                            key={cat}
                                            className={`btn ${selectedCats.includes(cat) ? 'active' : ''}`}
                                            onClick={() => setSelectedCats(prev => prev.includes(cat) ? prev.filter(c => c !== cat) : [...prev, cat])}
                                        >
                                            {cat.charAt(0).toUpperCase() + cat.slice(1)}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="form-group">
                                <label className="form-label">Type</label>
                                <div style={{ display: 'flex', borderRadius: '8px', overflow: 'hidden', border: '1px solid #3a2a30' }}>
                                    <button
                                        onClick={() => setType('reps')}
                                        style={{
                                            flex: 1,
                                            padding: '10px',
                                            border: 'none',
                                            fontSize: '13px',
                                            fontWeight: '600',
                                            cursor: 'pointer',
                                            WebkitAppearance: 'none',
                                            background: type === 'reps' ? 'rgba(139, 58, 98, 0.25)' : 'rgba(255, 255, 255, 0.03)',
                                            color: type === 'reps' ? '#c77da0' : '#666',
                                            borderRight: '1px solid #3a2a30',
                                        }}
                                    >
                                        Reps
                                    </button>
                                    <button
                                        onClick={() => setType('timed')}
                                        style={{
                                            flex: 1,
                                            padding: '10px',
                                            border: 'none',
                                            fontSize: '13px',
                                            fontWeight: '600',
                                            cursor: 'pointer',
                                            WebkitAppearance: 'none',
                                            background: type === 'timed' ? 'rgba(139, 58, 98, 0.25)' : 'rgba(255, 255, 255, 0.03)',
                                            color: type === 'timed' ? '#c77da0' : '#666',
                                        }}
                                    >
                                        Timed
                                    </button>
                                </div>
                            </div>

                            {/* Weight section */}
                            <div className="form-group">
                                <label className="form-label">Weight</label>
                                <div className="button-row" style={{ gap: '4px' }}>
                                    <button className={`btn ${weightMeaning === 'total' ? '' : 'btn-secondary'}`} onClick={() => { setWeightMeaning('total'); setBarType(null); }} style={{ flex: 1 }}>Total</button>
                                    <button className={`btn ${weightMeaning === 'per-side' ? '' : 'btn-secondary'}`} onClick={() => { setWeightMeaning('per-side'); setBarType(null); }} style={{ flex: 1 }}>Per Side</button>
                                    <button className={`btn ${weightMeaning === 'bar' ? '' : 'btn-secondary'}`} onClick={() => setWeightMeaning('bar')} style={{ flex: 1 }}>Bar</button>
                                </div>
                                <div style={{ fontSize: '11px', color: 'rgba(199,125,160,0.5)', marginTop: '4px' }}>
                                    {weightMeaning === 'total' ? 'Machine / cable -- log total weight' : weightMeaning === 'per-side' ? 'Dumbbells -- log weight per hand' : weightMeaning === 'bar' ? 'Select bar type below' : ''}
                                </div>

                                {weightMeaning === 'bar' && (
                                    <div style={{ marginTop: '8px' }}>
                                        <div className="button-row" style={{ gap: '4px' }}>
                                            <button className={`btn ${barType === 'barbell' ? '' : 'btn-secondary'}`} onClick={() => { setBarType('barbell'); setCustomBarWeight(''); }} style={{ flex: 1 }}>Barbell</button>
                                            <button className={`btn ${barType === 'custom' ? '' : 'btn-secondary'}`} onClick={() => setBarType('custom')} style={{ flex: 1 }}>Custom</button>
                                        </div>
                                        {barType === 'custom' && (
                                            <input type="number" className="form-input" placeholder="Bar weight..." value={customBarWeight} onChange={(e) => setCustomBarWeight(e.target.value)} style={{ marginTop: '6px' }} />
                                        )}
                                        <div style={{ fontSize: '11px', color: 'rgba(199,125,160,0.5)', marginTop: '4px' }}>
                                            {barType === 'barbell' ? '45 lbs will be automatically added to each set to account for the bar' : barType === 'custom' && customBarWeight ? `${customBarWeight} lbs will be automatically added to each set to account for the bar` : barType === 'custom' ? 'Enter the bar weight to auto-add to each set' : 'Select a bar type'}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Weight Default */}
                            <div className="form-group">
                                <label className="form-label">Default Weight Mode</label>
                                <div className="button-row" style={{ gap: '4px' }}>
                                    <button className={`btn ${weightDefault === 'weight' ? '' : 'btn-secondary'}`} onClick={() => setWeightDefault('weight')} style={{ flex: 1, fontSize: '12px' }}>Weight</button>
                                    <button className={`btn ${weightDefault === 'bodyweight' ? '' : 'btn-secondary'}`} onClick={() => setWeightDefault('bodyweight')} style={{ flex: 1, fontSize: '12px' }}>Bodyweight</button>
                                    <button className={`btn ${weightDefault === 'none' ? '' : 'btn-secondary'}`} onClick={() => setWeightDefault('none')} style={{ flex: 1, fontSize: '12px' }}>No Weight</button>
                                </div>
                                <div style={{ fontSize: '11px', color: 'rgba(199,125,160,0.5)', marginTop: '4px' }}>
                                    {weightDefault === 'weight' ? 'Weight picker shown each set' : weightDefault === 'bodyweight' ? 'Auto-logs as bodyweight, skip weight picker' : 'Skip weight picker entirely, just log reps/duration'}
                                </div>
                            </div>

                            <button
                                className="btn"
                                onClick={handleSave}
                                style={{ opacity: name.trim() ? 1 : 0.4, marginBottom: '8px', marginTop: '8px' }}
                            >
                                Create Activity
                            </button>
                            <button
                                className="btn btn-secondary"
                                onClick={onCancel}
                            >
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>

                {showSplitWarning && (
                    <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.85)', zIndex: 300, display: 'flex', alignItems: 'center', justifyContent: 'center', animation: 'fadeIn 0.5s', flexDirection: 'column', padding: '32px' }}>
                        <div style={{ color: '#e8c1d0', fontSize: '16px', textAlign: 'center', marginBottom: '24px', lineHeight: '1.5' }}>
                            Are you sure you don't want to assign to a split?
                        </div>
                        <div style={{ display: 'flex', gap: '12px', marginBottom: '20px' }}>
                            <button onClick={async () => { setShowSplitWarning(false); await doSave(); }} style={{ padding: '12px 24px', borderRadius: '8px', border: 'none', background: '#8b3a62', color: '#fff', fontSize: '14px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none' }}>Proceed</button>
                            <button onClick={() => setShowSplitWarning(false)} style={{ padding: '12px 24px', borderRadius: '8px', border: '1px solid rgba(139,58,98,0.3)', background: 'none', color: '#c77da0', fontSize: '14px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none' }}>Go back</button>
                        </div>
                        <label style={{ display: 'flex', alignItems: 'center', gap: '8px', color: 'rgba(199,125,160,0.5)', fontSize: '12px', cursor: 'pointer' }}>
                            <input type="checkbox" onChange={(e) => { if (e.target.checked) setPref('skipSplitWarning', 'true'); else removePref('skipSplitWarning'); }} style={{ accentColor: '#8b3a62' }} />
                            Do not ask me this again
                        </label>
                    </div>
                )}
                </>

                                        padding: '12px',

                                        borderRadius: '8px',

            const [chimeVariant, setChimeVariant] = useState(getPref('timerChimeVariant', 'major'));
            const [chimeSpeed, setChimeSpeed] = useState(parseInt(getPref('timerChimeSpeed', '150')));
            const [chimePitch, setChimePitch] = useState(parseInt(getPref('timerChimePitch', '523')));
            const [bowlSustain, setBowlSustain] = useState(parseFloat(getPref('timerBowlSustain', '3')));
            const [bowlHarmonics, setBowlHarmonics] = useState(parseInt(getPref('timerBowlHarmonics', '5')));
            const [fanfareVariant, setFanfareVariant] = useState(getPref('timerFanfareVariant', 'short'));
            const [sosFrequency, setSOSFrequency] = useState(parseInt(getPref('timerSOSFrequency', '600')));
            const [sosSpeed, setSOSSpeed] = useState(parseFloat(getPref('timerSOSSpeed', '1')));

            // Save on every change
            useEffect(() => {

                setPref('timerChimePitch', String(chimePitch));
                setPref('timerBowlSustain', String(bowlSustain));
                setPref('timerBowlHarmonics', String(bowlHarmonics));
                setPref('timerFanfareVariant', fanfareVariant);
                setPref('timerSOSFrequency', String(sosFrequency));
                setPref('timerSOSSpeed', String(sosSpeed));
                setPref('timerTickStyle', tickStyle);

                                                        <button onClick={(e) => { e.stopPropagation(); previewCompletion(); }} style={{
                                                            padding: '3px 8px', borderRadius: '6px', border: '1px solid rgba(139,58,98,0.3)',
                                                            background: 'rgba(139,58,98,0.08)', color: '#c77da0', fontSize: '10px',
                                                            cursor: 'pointer', WebkitAppearance: 'none'
                                                        }}>Preview</button>
                                                    )}
                                                </div>

                                                {/* Expanded controls per chime type */}
                                                {category === 'fanfare' && opt.id === 'fanfare' && (
                                                    <div onClick={(e) => e.stopPropagation()} style={{ marginTop: '10px' }}>
                                                        <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
                                                            {['short', 'full', 'retro', 'epic'].map(v => (
                                                                <button key={v} onClick={() => { setFanfareVariant(v); playVictoryFanfare(v); }} style={variantBtnStyle(fanfareVariant === v)}>
                                                                    {v.charAt(0).toUpperCase() + v.slice(1)}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                {category === 'bowl' && opt.id === 'bowl' && (
                                                    <div onClick={(e) => e.stopPropagation()} style={{ marginTop: '10px' }}>
                                                        {sliderRow('Sustain', bowlSustain, 1, 5, 0.5, setBowlSustain, bowlSustain.toFixed(1) + 's')}
                                                        {sliderRow('Richness', bowlHarmonics, 2, 8, 1, setBowlHarmonics, bowlHarmonics + ' overtones')}
                                                        <div style={{ fontSize: '9px', color: 'rgba(199,125,160,0.35)', marginTop: '4px' }}>Richness = number of harmonic overtones layered on the fundamental tone (220 Hz). More overtones = fuller, richer sound.</div>
                                                    </div>
                                                )}
                                                {category === 'chime' && opt.id === 'chime' && (
                                                    <div onClick={(e) => e.stopPropagation()} style={{ marginTop: '10px' }}>
                                                        <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap', marginBottom: '6px' }}>
                                                            {['major', 'minor', 'pentatonic', 'octave'].map(v => (
                                                                <button key={v} onClick={() => { setChimeVariant(v); playGentleChime(v, chimeSpeed, chimePitch); }} style={variantBtnStyle(chimeVariant === v)}>
                                                                    {v.charAt(0).toUpperCase() + v.slice(1)}
                                                                </button>
                                                            ))}
                                                        </div>
                                                        {sliderRow('Speed', chimeSpeed, 80, 300, 10, setChimeSpeed, chimeSpeed + 'ms')}
                                                        {sliderRow('Pitch', chimePitch, 200, 800, 10, setChimePitch, chimePitch + 'Hz')}
                                                    </div>
                                                )}
                                                {category === 'sos' && opt.id === 'sos' && (
                                                    <div onClick={(e) => e.stopPropagation()} style={{ marginTop: '10px' }}>
                                                        {sliderRow('Frequency', sosFrequency, 300, 1200, 50, setSOSFrequency, sosFrequency + 'Hz')}
                                                        {sliderRow('Speed', sosSpeed, 0.5, 2, 0.1, setSOSSpeed, sosSpeed.toFixed(1) + 'x')}
                                                        <div style={{ fontSize: '9px', color: 'rgba(199,125,160,0.35)', marginTop: '4px' }}>Morse SOS pattern: ··· — — — ···</div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* ===== COUNTDOWN DURATION 3-SEGMENT ===== */}
                            <div style={{ color: 'rgba(199,125,160,0.5)', fontSize: '10px', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '8px' }}>Countdown Duration</div>
                            <div style={{ display: 'flex', borderRadius: '8px', overflow: 'hidden', border: '1px solid rgba(139,58,98,0.3)', marginBottom: '20px', height: '36px' }}>
                                {[{v: 5, l: '5 seconds'}, {v: 10, l: '10 seconds'}, {v: 0, l: 'No countdown'}].map((seg, i) => (
                                    <button key={seg.v} onClick={() => setTickSeconds(seg.v)} style={{
                                        flex: 1, border: 'none', borderLeft: i > 0 ? '1px solid rgba(139,58,98,0.3)' : 'none',
                                        fontSize: '11px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none',
                                        background: tickSeconds === seg.v ? '#8b3a62' : 'rgba(139,58,98,0.06)',
                                        color: tickSeconds === seg.v ? '#fff' : '#c77da0'
                                    }}>{seg.l}</button>
                                ))}
                            </div>

                            {/* ===== PLAY 5s COUNTDOWN BUTTON ===== */}
                            <button onClick={previewCountdown} style={{
                                width: '100%', height: '48px', border: '1.5px solid rgba(139,58,98,0.4)', borderRadius: '12px',
                                background: 'linear-gradient(135deg, rgba(139,58,98,0.12), rgba(139,58,98,0.06))',
                                color: '#e8c1d0', fontSize: '14px', fontWeight: '600',
                                cursor: 'pointer', WebkitAppearance: 'none',
                            }}>
                                Play 5s Countdown
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const TimedDurationModal = ({ exercise, weight, weightType, bandedColor, onSelectDuration, setNumber }) => {
            // Stopwatch
            const [time, setTime] = useState(0);
            const [isRunning, setIsRunning] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            const swIntervalRef = useRef(null);
            // Presets & edit
            const DEFAULT_PRESETS = [30, 60, 300, 600, 900, 1200, 1800, 2700, 3600];
            const [customPresets, setCustomPresets] = useState(DEFAULT_PRESETS);
            const [editMode, setEditMode] = useState(false);
            const [numpadDigits, setNumpadDigits] = useState([]);
            const presetsLoadedRef = useRef(false);

            // Load persisted presets from IndexedDB on mount
            useEffect(() => {
                if (presetsLoadedRef.current) return;
                presetsLoadedRef.current = true;
                (async () => {
                    const record = await dbOps.dayNotes.get('__duration_presets__');
                    if (record && record.note) {
                        try {
                            const saved = JSON.parse(record.note);
                            if (Array.isArray(saved) && saved.length > 0) setCustomPresets(saved);
                        } catch(e) {}
                    }
                })();
            }, []);

            // Save presets to IndexedDB whenever they change
            const persistPresets = (presets) => {
                setCustomPresets(presets);
                safeDb(() => dbOps.dayNotes.set('__duration_presets__', JSON.stringify(presets)), 'save presets');
            };
            // Countdown
            const [countdownMode, setCountdownMode] = useState(false);
            const [countdownTime, setCountdownTime] = useState(null);
            const [countdownActive, setCountdownActive] = useState(false);
            const [countdownPreset, setCountdownPreset] = useState(null);
            const [countdownFinished, setCountdownFinished] = useState(false);
            const cdIntervalRef = useRef(null);
            // Sound settings
            const [showSoundSettings, setShowSoundSettings] = useState(false);
            // Dial
            const [dialAngle, setDialAngle] = useState(0);
            const dialRef = useRef(null);
            const draggingRef = useRef(false);

            // Stopwatch timer
            useEffect(() => {
                if (isRunning) {
                    swIntervalRef.current = setInterval(() => setTime(t => t + 1), 1000);
                } else {
                    if (swIntervalRef.current) clearInterval(swIntervalRef.current);
                }
                return () => { if (swIntervalRef.current) clearInterval(swIntervalRef.current); };
            }, [isRunning]);

            // Countdown timer
            useEffect(() => {
                if (countdownActive && countdownTime > 0) {
                    cdIntervalRef.current = setInterval(() => {
                        setCountdownTime(t => {
                            const next = t - 1;
                            const soundsOn = getPref('timerSoundsEnabled') === 'true';
                            if (soundsOn) {
                                const tickSec = parseInt(getPref('timerTickSeconds', '5'));
                                const tickStylePref = getPref('timerTickStyle', 'beep');
                                if (next > 0 && next <= tickSec) playTickSound(tickStylePref);
                            }
                            if (next <= 0) {
                                clearInterval(cdIntervalRef.current);
                                if (soundsOn) playCompletionSound();
                                setCountdownActive(false);
                                setCountdownFinished(true);
                                return 0;
                            }
                            return next;
                        });
                    }, 1000);
                } else if (!countdownActive) {
                    if (cdIntervalRef.current) clearInterval(cdIntervalRef.current);
                }
                return () => { if (cdIntervalRef.current) clearInterval(cdIntervalRef.current); };
            }, [countdownActive]);

            const formatTime = (s) => { const m = Math.floor(s / 60); return `${m}:${String(s % 60).padStart(2, '0')}`; };
            const formatPresetTime = (s) => {
                if (s >= 3600) return `${Math.floor(s/3600)}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:00`;
                return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
            };
            const displayWeight = weightType === 'bodyweight' ? 'BW' : weightType === 'banded' ? (bandedColor || 'Banded') : `${weight} ${weightType}`;

            // Stopwatch controls
            const startStopwatch = () => { setIsRunning(true); setIsPaused(false); };
            const pauseStopwatch = () => { setIsRunning(false); setIsPaused(true); };
            const resumeStopwatch = () => { setIsRunning(true); setIsPaused(false); };
            const resetStopwatch = () => { setIsRunning(false); setIsPaused(false); setTime(0); };
            const hasStarted = isRunning || isPaused || time > 0;

            // Numpad
            const numpadValue = (() => {
                const raw = numpadDigits.join('').padStart(4, '0');
                const mm = parseInt(raw.slice(0, 2)), ss = parseInt(raw.slice(2, 4));
                return { mm, ss, total: mm * 60 + ss, display: numpadDigits.length === 0 ? '0:00' : mm + ':' + raw.slice(2, 4) };
            })();
            const handleNumpadPress = (d) => { if (numpadDigits.length < 4) setNumpadDigits([...numpadDigits, d]); };
            const handleNumpadBackspace = () => setNumpadDigits(numpadDigits.slice(0, -1));
            const handleNumpadClear = () => setNumpadDigits([]);
            const handleAddPresetFromNumpad = () => {
                if (numpadValue.total > 0) {
                    const updated = [...customPresets.filter(v => v !== numpadValue.total), numpadValue.total].sort((a,b) => a-b);
                    persistPresets(updated);
                    setNumpadDigits([]);
                }
            };
            const handleDeletePreset = (p) => {
                const updated = customPresets.filter(v => v !== p);
                persistPresets(updated);
            };

            // Preset click handler
            const handlePresetClick = (preset) => {
                if (countdownMode) {
                    setCountdownPreset(preset); setCountdownTime(preset); setCountdownActive(true);
                } else {
                    onSelectDuration(preset);
                }
            };
            const cancelCountdown = () => { setCountdownActive(false); setCountdownFinished(false); setCountdownTime(null); setCountdownPreset(null); };

            // Dial
            const dialMinutes = Math.round((dialAngle / 360) * 60);
            const dialSeconds = dialMinutes * 60;
            const circumference = 2 * Math.PI * 80;
            const dialOffset = circumference * (1 - dialAngle / 360);
            const hRad = ((dialAngle - 90) * Math.PI) / 180;
            const hX = 100 + 80 * Math.cos(hRad), hY = 100 + 80 * Math.sin(hRad);
            const getDialAngle = (e) => {
                if (!dialRef.current) return 0;
                const r = dialRef.current.getBoundingClientRect();
                const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left - r.width/2;
                const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top - r.height/2;
                return ((Math.atan2(cy, cx) * 180 / Math.PI) + 90 + 360) % 360;
            };
            const dialStart = (e) => { e.preventDefault(); draggingRef.current = true; setDialAngle(getDialAngle(e)); };
            const dialMove = (e) => { if (draggingRef.current) { e.preventDefault(); setDialAngle(getDialAngle(e)); } };
            const dialEnd = () => { draggingRef.current = false; };

            const jiggleStyle = editMode ? `@keyframes jiggle { 0% { transform: rotate(0deg); } 25% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } 75% { transform: rotate(-1deg); } 100% { transform: rotate(0deg); } }` : '';

            // Shared preset button style
            const presetBtnStyle = { padding: '14px 8px', textAlign: 'center', border: '1.5px solid rgba(139,58,98,0.3)', borderRadius: '12px', background: 'rgba(139,58,98,0.06)', color: '#c77da0', fontSize: '16px', fontWeight: '500' };

            return (
                <div className="modal-overlay" onClick={() => { if (!countdownActive) onSelectDuration(null); }}>
                    <style>{jiggleStyle}</style>
                    {showSoundSettings && <SoundSettingsModal onClose={() => setShowSoundSettings(false)} />}
                    <div className="modal" style={{ top: 0, bottom: 0, borderRadius: 0, borderTop: 'none' }} onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header" {...makeSwipeDownHandlers(() => { if (!countdownActive) onSelectDuration(null); })}>
                            <div>
                                <h2 style={{ fontSize: '16px' }}>{exercise.name} — Set {setNumber || 1}</h2>
                                <div style={{ fontSize: '11px', color: 'rgba(199,125,160,0.5)', marginTop: '2px' }}>Weight: {displayWeight}</div>
                            </div>
                            <button className="close-btn" onClick={() => { if (!countdownActive) onSelectDuration(null); }}>x</button>
                        </div>
                        <div className="modal-content" style={{ flex: 1, overflowY: 'auto', padding: '16px' }}>

                            {/* ============ EDIT MODE ============ */}
                            {editMode ? (
                                <div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                                        <span style={{ color: '#c77da0', fontSize: '13px', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '1px' }}>Edit Presets</span>
                                        <button onClick={() => { setEditMode(false); setNumpadDigits([]); }} style={{ padding: '6px 14px', borderRadius: '8px', border: '1px solid rgba(139,58,98,0.3)', background: 'rgba(139,58,98,0.1)', color: '#c77da0', fontSize: '12px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none' }}>Done</button>
                                    </div>
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '6px', marginBottom: '10px' }}>
                                        {customPresets.map((preset, idx) => (
                                            <div key={preset} style={{ position: 'relative', animation: 'jiggle 0.3s ease-in-out infinite', animationDelay: `${idx * 0.05}s` }}>
                                                <div style={{ ...presetBtnStyle, padding: '10px 6px', fontSize: '14px' }}>{formatPresetTime(preset)}</div>
                                                <button onClick={() => handleDeletePreset(preset)} style={{ position: 'absolute', top: '-6px', right: '-6px', width: '20px', height: '20px', borderRadius: '50%', background: '#c0392b', border: '2px solid #1a0a12', color: '#fff', fontSize: '12px', fontWeight: 'bold', cursor: 'pointer', padding: 0, WebkitAppearance: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>×</button>
                                            </div>
                                        ))}
                                    </div>
                                    <div style={{ height: '1px', background: 'rgba(139,58,98,0.15)', margin: '4px 0 6px' }} />
                                    <span style={{ color: 'rgba(199,125,160,0.5)', fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Add New Preset</span>
                                    {/* Display + Add button side by side */}
                                    <div style={{ display: 'flex', gap: '6px', alignItems: 'stretch', margin: '4px 0' }}>
                                        <div style={{ flex: 1, textAlign: 'center', fontSize: '22px', fontWeight: '300', color: '#e8c1d0', padding: '4px 0', borderBottom: '1px solid rgba(139,58,98,0.2)', fontVariantNumeric: 'tabular-nums', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{numpadValue.display}</div>
                                        <button onClick={handleAddPresetFromNumpad} disabled={numpadValue.total === 0} style={{ flex: 1, height: 'auto', border: 'none', borderRadius: '8px', background: numpadValue.total > 0 ? 'linear-gradient(135deg, #8b3a62, #a04574)' : 'rgba(139,58,98,0.15)', color: numpadValue.total > 0 ? '#fff' : 'rgba(199,125,160,0.3)', fontSize: '13px', fontWeight: '600', cursor: numpadValue.total > 0 ? 'pointer' : 'default', WebkitAppearance: 'none', padding: '6px' }}>
                                            Add {numpadValue.total > 0 ? numpadValue.display : ''}
                                        </button>
                                    </div>
                                    <div style={{ fontSize: '9px', color: 'rgba(199,125,160,0.3)', textAlign: 'center', marginBottom: '4px' }}>Enter digits → MM:SS</div>
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '4px' }}>
                                        {[1,2,3,4,5,6,7,8,9].map(d => (
                                            <button key={d} onClick={() => handleNumpadPress(d)} style={{ height: '38px', border: '1px solid rgba(139,58,98,0.25)', borderRadius: '8px', background: 'rgba(139,58,98,0.06)', color: '#e8c1d0', fontSize: '16px', cursor: 'pointer', WebkitAppearance: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{d}</button>
                                        ))}
                                        <button onClick={handleNumpadClear} style={{ height: '38px', border: '1px solid rgba(139,58,98,0.25)', borderRadius: '8px', background: 'rgba(139,58,98,0.15)', color: '#c77da0', fontSize: '11px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>CLR</button>
                                        <button onClick={() => handleNumpadPress(0)} style={{ height: '38px', border: '1px solid rgba(139,58,98,0.25)', borderRadius: '8px', background: 'rgba(139,58,98,0.06)', color: '#e8c1d0', fontSize: '16px', cursor: 'pointer', WebkitAppearance: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>0</button>
                                        <button onClick={handleNumpadBackspace} style={{ height: '38px', border: '1px solid rgba(139,58,98,0.25)', borderRadius: '8px', background: 'rgba(139,58,98,0.15)', color: '#c77da0', fontSize: '14px', cursor: 'pointer', WebkitAppearance: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>⌫</button>
                                    </div>
                                </div>
                            ) : (
                                /* ============ GENERAL VIEW ============ */
                                <div>
                                    {/* === PRESETS AT TOP === */}
                                    <div style={{ marginBottom: '16px' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', marginBottom: '10px', gap: '8px' }}>
                                            <span style={{ color: '#c77da0', fontSize: '13px', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '1px' }}>Presets</span>
                                            {/* Countdown toggle */}
                                            <div onClick={() => setCountdownMode(!countdownMode)} style={{ width: '36px', height: '20px', borderRadius: '10px', background: countdownMode ? '#8b3a62' : 'rgba(139,58,98,0.2)', cursor: 'pointer', position: 'relative', transition: 'background 0.2s', flexShrink: 0 }}>
                                                <div style={{ width: '16px', height: '16px', borderRadius: '50%', background: '#fff', position: 'absolute', top: '2px', left: countdownMode ? '18px' : '2px', transition: 'left 0.2s', boxShadow: '0 1px 3px rgba(0,0,0,0.3)' }} />
                                            </div>
                                            <span style={{ fontSize: '10px', color: 'rgba(199,125,160,0.4)' }}>{countdownMode ? 'countdown' : ''}</span>
                                            <div style={{ flex: 1 }} />
                                            {countdownMode && getPref('timerSoundsEnabled') === 'true' && (
                                                <button onClick={() => setShowSoundSettings(true)} style={{ padding: '4px 10px', borderRadius: '6px', border: 'none', background: 'none', color: 'rgba(199,125,160,0.4)', fontSize: '11px', cursor: 'pointer', WebkitAppearance: 'none' }}>sounds</button>
                                            )}
                                            <button onClick={() => setEditMode(true)} style={{ padding: '6px 14px', borderRadius: '8px', border: '1px solid rgba(139,58,98,0.3)', background: 'rgba(139,58,98,0.1)', color: '#c77da0', fontSize: '12px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none' }}>Edit Presets</button>
                                        </div>

                                        {/* Active countdown overlay */}
                                        {countdownFinished && countdownPreset ? (
                                            <div style={{ textAlign: 'center', padding: '24px 0' }}>
                                                <div style={{ fontSize: '14px', color: 'rgba(199,125,160,0.5)', marginBottom: '8px' }}>Timer complete</div>
                                                <div style={{ fontSize: '32px', fontWeight: '300', color: '#e8c1d0', marginBottom: '20px' }}>{formatPresetTime(countdownPreset)}</div>
                                                <div style={{ display: 'flex', gap: '12px', justifyContent: 'center' }}>
                                                    <button
                                                        onClick={() => { setCountdownFinished(false); onSelectDuration(countdownPreset); }}
                                                        style={{
                                                            padding: '12px 28px', borderRadius: '10px', border: 'none', fontSize: '15px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none',
                                                            background: 'linear-gradient(135deg, #c75030, #e06840)', color: '#fff',
                                                            boxShadow: '0 0 16px rgba(224,104,64,0.4), 0 0 32px rgba(224,104,64,0.15)',
                                                        }}
                                                    >
                                                        Use {formatPresetTime(countdownPreset)}
                                                    </button>
                                                    <button
                                                        onClick={cancelCountdown}
                                                        style={{ padding: '12px 24px', borderRadius: '10px', border: '1.5px solid rgba(199,125,160,0.3)', background: 'rgba(139,58,98,0.08)', color: 'rgba(199,125,160,0.6)', fontSize: '14px', fontWeight: '500', cursor: 'pointer', WebkitAppearance: 'none' }}
                                                    >
                                                        Cancel
                                                    </button>
                                                </div>
                                            </div>
                                        ) : countdownActive && countdownTime !== null ? (
                                            <div style={{ textAlign: 'center', padding: '24px 0' }}>
                                                <div style={{ fontSize: '52px', fontWeight: '300', color: countdownTime <= 5 ? '#F4A5AE' : '#c77da0', fontVariantNumeric: 'tabular-nums', transition: 'color 0.3s' }}>{formatTime(countdownTime)}</div>
                                                <div style={{ fontSize: '11px', color: 'rgba(199,125,160,0.4)', marginTop: '4px', marginBottom: '16px' }}>counting down from {formatPresetTime(countdownPreset)}</div>
                                                <button onClick={cancelCountdown} style={{ padding: '10px 32px', borderRadius: '10px', border: '1.5px solid rgba(220,60,60,0.4)', background: 'rgba(220,60,60,0.1)', color: '#e57373', fontSize: '14px', fontWeight: '600', cursor: 'pointer', WebkitAppearance: 'none' }}>Cancel</button>
                                            </div>
                                        ) : (
                                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '8px' }}>
                                                {customPresets.map(preset => (
                                                    <button key={preset} onClick={() => handlePresetClick(preset)} style={{ ...presetBtnStyle, cursor: 'pointer', WebkitAppearance: 'none', transition: 'all 0.12s', position: 'relative' }}>
                                                        {countdownMode && <span style={{ position: 'absolute', top: '4px', right: '6px', fontSize: '8px', color: 'rgba(199,125,160,0.35)' }}>&gt;</span>}
                                                        {formatPresetTime(preset)}
                                                        <span style={{ display: 'block', fontSize: '10px', fontWeight: '400', opacity: 0.5, marginTop: '2px' }}>
                                                            {preset >= 3600 ? Math.floor(preset/3600) + ' hr' : preset >= 60 ? Math.floor(preset/60) + ' min' : preset + ' sec'}
                                                        </span>
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {/* Divider */}
                                    <div style={{ height: '1px', background: 'rgba(139,58,98,0.15)', margin: '8px 0 12px' }} />

                                    {/* === STOPWATCH + DIAL SIDE BY SIDE === */}
                                    <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
                                        {/* LEFT: Stopwatch — vertically centered to match dial */}
                                        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
                                            <div style={{ textAlign: 'center', marginBottom: '10px' }}>
